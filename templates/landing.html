{% extends 'base.html' %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center mb-5">
            <h1 class="display-3 fw-bold" style="color: #ffd700;">АИС Общепит</h1>
            <p class="lead text-white">Система автоматизации для ресторана, кафе, столовой</p>
            <p class="text-white">Вход только для сотрудников</p>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header" style="background: rgba(20,20,50,0.9); text-align: center;">
                    <h5 class="mb-0" style="color: #ffd700;">Вход в систему</h5>
                </div>
                <div class="card-body">
                    <div id="login-error" class="alert alert-danger" style="display: none;"></div>
                    <div class="form-group mb-3">
                        <label class="form-label" style="color: white;">Логин</label>
                        <input type="text" id="login-username" class="form-control" placeholder="Введите логин">
                    </div>
                    <div class="form-group mb-3">
                        <label class="form-label" style="color: white;">Пароль</label>
                        <input type="password" id="login-password" class="form-control" placeholder="Введите пароль">
                    </div>
                    <button class="btn btn-warning w-100" onclick="employeeLogin()" style="background: #ffd700; color: #1a1a4a;">Войти</button>
                    <div class="text-center mt-3">
                        <a href="/password-reset/" style="color: #ffd700;">Забыли пароль?</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    async function employeeLogin() {
        const username = document.getElementById('login-username').value;
        const password = document.getElementById('login-password').value;
        
        if (!username || !password) {
            showError('Введите логин и пароль');
            return;
        }
        
        try {
            const response = await fetch('/api/login/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: username, password: password})
            });
            const data = await response.json();
            
            if (data.success) {
                localStorage.setItem('user_role', data.role);
                localStorage.setItem('user_name', data.username);
                if (data.role === 'admin') {
                    window.location.href = '/admin-panel/';
                } else if (data.role === 'waiter') {
                    window.location.href = '/waiter/';
                } else if (data.role === 'chef') {
                    window.location.href = '/kitchen/';
                } else {
                    window.location.href = '/';
                }
            } else {
                showError(data.error || 'Неверный логин или пароль');
            }
        } catch (error) {
            showError('Ошибка соединения с сервером');
        }
    }
    
    function showError(message) {
        const errorDiv = document.getElementById('login-error');
        errorDiv.innerHTML = message;
        errorDiv.style.display = 'block';
        setTimeout(() => {
            errorDiv.style.display = 'none';
        }, 3000);
    }
</script>
{% endblock %}
