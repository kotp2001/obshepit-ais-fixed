{% extends 'base.html' %}
{% block title %}Зал ресторана{% endblock %}
{% block content %}

<div class="card">
    <div class="card-header">
        <h4>Зал ресторана</h4>
        <button class="btn btn-sm btn-warning" onclick="loadTables()">Обновить</button>
    </div>
    <div class="card-body">
        <div id="hallContainer" class="row"></div>
    </div>
</div>

<div class="mt-4">
    <h5>Готовые заказы</h5>
    <div id="readyContainer"></div>
</div>

<script>
// Глобальное состояние
let currentTableId = null;
let currentCart = [];

// 1. Загрузка столов
async function loadTables() {
    const res = await fetch('/api/tables/');
    const data = await res.json();
    if (!data.success) return;
    const container = document.getElementById('hallContainer');
    container.innerHTML = '';
    for (let t of data.data) {
        const free = t.status === 'free';
        const div = document.createElement('div');
        div.className = 'col-md-3 mb-3';
        div.innerHTML = `
            <div style="background:${free ? '#2e7d32' : '#c62828'}; padding:15px; border-radius:12px; color:white; text-align:center; cursor:${free ? 'pointer' : 'default'}; opacity:${free ? 1 : 0.6}">
                <i class="fas fa-chair"></i>
                <h3>Стол ${t.number}</h3>
                <p>${t.seats} мест</p>
                <span>${free ? 'Свободен' : (t.status === 'occupied' ? 'Занят' : 'Забронирован')}</span>
            </div>
        `;
        if (free) {
            div.querySelector('div').onclick = () => openOrder(t.id, t.number, t.seats);
        }
        container.appendChild(div);
    }
    await loadReadyOrders();
}

// 2. Загрузка готовых заказов
async function loadReadyOrders() {
    const res = await fetch('/api/orders/active/');
    const data = await res.json();
    const container = document.getElementById('readyContainer');
    if (!data.success || !data.data.length) {
        container.innerHTML = '<p>Нет активных заказов</p>';
        return;
    }
    const ready = data.data.filter(o => o.status === 'ready');
    if (!ready.length) {
        container.innerHTML = '<p>Нет готовых заказов</p>';
        return;
    }
    container.innerHTML = ready.map(o => `
        <div class="card d-inline-block m-1" style="width:18rem;">
            <div class="card-body">
                <h5>Заказ для стола ${o.table_number}</h5>
                <p>${o.created_at}</p>
                <button class="btn btn-warning" onclick="openPayment(${o.id})">Принять оплату</button>
            </div>
        </div>
    `).join('');
}

// 3. Открыть окно заказа (через prompt и confirm, без Bootstrap модалки)
async function openOrder(tableId, tableNumber, maxSeats) {
    currentTableId = tableId;
    currentCart = [];

    const dishesRes = await fetch('/api/dishes/');
    const dishesData = await dishesRes.json();
    if (!dishesData.success) return;
    const dishes = dishesData.data;

    // Группируем по категориям
    const categories = {};
    for (let d of dishes) {
        if (!categories[d.category]) categories[d.category] = [];
        categories[d.category].push(d);
    }

    // Формируем текстовое меню для выбора
    let menuText = "Выберите блюдо:\n";
    let idx = 1;
    const dishMap = {};
    for (let cat in categories) {
        menuText += `\n--- ${cat} ---\n`;
        for (let d of categories[cat]) {
            menuText += `${idx}. ${d.name} - ${d.price} ₽\n`;
            dishMap[idx] = d;
            idx++;
        }
    }
    menuText += `\n0. Завершить и оформить заказ`;

    let cartStr = '';
    while (true) {
        let choice = prompt(menuText + (cartStr ? `\n\nВаша корзина:\n${cartStr}` : ''));
        if (choice === null) return; // отмена
        let num = parseInt(choice);
        if (num === 0) break;
        if (dishMap[num]) {
            const dish = dishMap[num];
            let qty = parseInt(prompt(`Сколько ${dish.name}?`, "1"));
            if (isNaN(qty) || qty < 1) qty = 1;
            const existing = currentCart.find(i => i.id === dish.id);
            if (existing) existing.qty += qty;
            else currentCart.push({ id: dish.id, name: dish.name, price: dish.price, qty: qty });
            cartStr = currentCart.map(i => `${i.name} x${i.qty} = ${i.price * i.qty}₽`).join('\n');
        } else {
            alert("Неверный выбор");
        }
    }

    if (currentCart.length === 0) {
        alert("Корзина пуста");
        return;
    }

    let guestCount = prompt("Количество гостей:", "2");
    guestCount = parseInt(guestCount) || 2;
    if (guestCount > maxSeats) {
        alert(`Максимум ${maxSeats} гостей. Установлено ${maxSeats}`);
        guestCount = maxSeats;
    }

    const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));
    const createRes = await fetch('/api/orders/create/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount })
    });
    const createData = await createRes.json();
    if (createData.success) {
        alert(`Заказ #${createData.order_id} создан! Сумма: ${createData.total} ₽`);
        loadTables();
    } else {
        alert(`Ошибка: ${createData.error}`);
    }
}

// 4. Оплата (через prompt)
window.openPayment = async function(orderId) {
    const method = prompt("Выберите способ оплаты:\n1 - Наличные\n2 - Карта\n3 - QR-код", "1");
    let payMethod = '';
    if (method === '1') payMethod = 'cash';
    else if (method === '2') payMethod = 'card';
    else if (method === '3') payMethod = 'qr';
    else return;
    const payRes = await fetch('/api/orders/pay/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order_id: orderId, payment_method: payMethod })
    });
    const payData = await payRes.json();
    if (payData.success) {
        // Показать чек
        const receiptRes = await fetch(`/api/orders/receipt/${orderId}/`);
        const receipt = await receiptRes.json();
        if (receipt.success) {
            let msg = `ЧЕК\nАИС "Общепит"\nЗаказ #${receipt.data.order_id}\nСтол ${receipt.data.table_number}\n${receipt.data.created_at}\n`;
            receipt.data.items.forEach(i => {
                msg += `${i.name} x${i.quantity} = ${i.total} ₽\n`;
            });
            msg += `\nИТОГО: ${receipt.data.total} ₽\nОплата: ${payMethod === 'cash' ? 'Наличные' : (payMethod === 'card' ? 'Карта' : 'QR-код')}\nСпасибо!`;
            alert(msg);
        }
        loadTables();
    } else {
        alert(`Ошибка оплаты: ${payData.error}`);
    }
};

loadTables();
</script>
{% endblock %}
