{% extends 'base.html' %}
{% load static %}
{% block title %}Зал ресторана - Официант{% endblock %}

{% block content %}
<style>
    .table-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .table-card:hover { transform: translateY(-4px); box-shadow: 0 6px 12px rgba(0,0,0,0.15); cursor: pointer; }
</style>

<div class="card" style="background:rgba(20,20,60,0.7); border:1px solid rgba(255,215,0,0.2); border-radius:16px;">
    <div class="card-header d-flex justify-content-between align-items-center">
        <h4 class="mb-0"><i class="fas fa-utensils me-2"></i>Зал ресторана</h4>
        <button class="btn btn-warning btn-sm" id="refreshTablesBtn">Обновить</button>
    </div>
    <div class="card-body" id="tables-container">
        <!-- Сюда динамически загрузятся столы -->
        <div class="text-center py-5">Загрузка столов...</div>
    </div>
</div>

<div class="mt-4">
    <h5><i class="fas fa-bell me-2"></i>Активные заказы</h5>
    <div id="active-orders-container" class="row g-3"></div>
</div>

<!-- Модальное окно для заказа -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content bg-dark text-white">
            <div class="modal-header">
                <h5 class="modal-title text-warning">Меню</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-7" id="menu-items-container">Загрузка меню...</div>
                    <div class="col-md-5">
                        <h5 class="text-warning">Ваш заказ</h5>
                        <div id="order-cart" class="border rounded p-2 mb-2" style="min-height: 200px;">Корзина пуста.</div>
                        <div class="d-flex justify-content-between mt-2">
                            <strong>Итого:</strong>
                            <span id="order-total">0 ₽</span>
                        </div>
                        <label class="mt-2">Количество гостей:</label>
                        <input type="number" id="guestCount" class="form-control form-control-sm bg-dark text-white border-warning" value="2" min="1">
                        <button id="create-order-btn" class="btn btn-warning w-100 mt-3">Оформить заказ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Глобальная переменная для хранения текущего заказа
    let currentOrder = { cart: [], tableId: null, maxSeats: 8 };

    async function fetchAndDisplayActiveOrders() { ... }
    function openOrderModal(tableId, tableNumber, maxSeats) { ... }
    function renderOrderCart() { ... }
    function removeFromCart(dishId) { ... }
    async function createOrder() { ... }
    function initializeEventListeners() { ... }
    // Запуск при загрузке страницы
    document.addEventListener('DOMContentLoaded', function() { ... });
</script>
{% endblock %}
