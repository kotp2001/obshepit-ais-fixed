{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}
{% block content %}

<div class="card" style="background:rgba(20,20,60,0.7); border:1px solid rgba(255,215,0,0.2); border-radius:16px;">
    <div class="card-header" style="background:rgba(10,10,40,0.8);">
        <div class="d-flex justify-content-between align-items-center">
            <h4 style="color:#ffd700;"><i class="fas fa-utensils me-2"></i>Зал ресторана</h4>
            <button class="btn btn-warning btn-sm" onclick="loadTables()">Обновить</button>
        </div>
    </div>
    <div class="card-body">
        <div id="hallContainer" class="row g-3"></div>
    </div>
</div>

<div class="mt-4">
    <h5 style="color:#ffd700;"><i class="fas fa-bell me-2"></i>Готовые заказы</h5>
    <div id="readyContainer" class="row g-3"></div>
</div>

<!-- Модальное окно заказа (будет заполняться динамически) -->
<div id="modalContainer"></div>

<!-- Модальное окно оплаты -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:rgba(20,20,60,0.97); border:1px solid rgba(255,215,0,0.3);">
            <div class="modal-header">
                <h5 class="modal-title" style="color:#ffd700;">Оплата заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <select id="paymentMethodSelect" class="form-select mb-3" style="background:rgba(30,30,80,0.9); color:white;">
                    <option value="cash">Наличные</option>
                    <option value="card">Карта</option>
                    <option value="qr">QR-код</option>
                </select>
                <button id="confirmPayBtn" class="btn btn-warning w-100">Подтвердить оплату</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно чека -->
<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:white; color:#1a1a4a; border-radius:14px; font-family:monospace;">
            <div class="modal-body" id="receiptContent" style="padding:24px;"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button class="btn btn-warning" id="printReceiptBtn">Печать</button>
            </div>
        </div>
    </div>
</div>

<script>
// Глобальные переменные
let currentTableId = null;
let currentCart = [];
let currentOrderId = null;

// ---------- 1. Загрузка столов ----------
async function loadTables() {
    try {
        const resp = await fetch('/api/tables/');
        const data = await resp.json();
        if (!data.success) throw new Error(data.error);
        const container = document.getElementById('hallContainer');
        if (!data.data.length) {
            container.innerHTML = '<p class="text-center">Столы не найдены</p>';
            return;
        }
        container.innerHTML = data.data.map(table => {
            const free = table.status === 'free';
            const label = free ? 'Свободен' : (table.status === 'occupied' ? 'Занят' : 'Забронирован');
            const borderColor = free ? '#2e7d32' : (table.status === 'occupied' ? '#c62828' : '#f9a825');
            const bgColor = free ? 'rgba(40,90,40,0.6)' : (table.status === 'occupied' ? 'rgba(90,40,40,0.6)' : 'rgba(90,70,30,0.6)');
            return `
                <div class="col-6 col-md-3">
                    <div class="table-card" data-id="${table.id}" data-number="${table.number}" data-seats="${table.seats}" data-free="${free}"
                         style="background:${bgColor}; border:2px solid ${borderColor}; border-radius:16px; padding:15px; text-align:center; cursor:${free ? 'pointer' : 'not-allowed'}; opacity:${free ? '1' : '0.6'};">
                        <i class="fas fa-utensils" style="color:#ffd700; font-size:24px;"></i>
                        <div style="color:white; font-size:18px;">Стол ${table.number}</div>
                        <div style="color:rgba(255,255,255,0.7);">${table.seats} мест</div>
                        <div style="background:rgba(0,0,0,0.3); color:${free ? '#a5d6a7' : '#ef9a9a'}; border-radius:20px; padding:3px 10px; display:inline-block; margin-top:8px;">${label}</div>
                    </div>
                </div>
            `;
        }).join('');
        // Навешиваем обработчики на столы
        document.querySelectorAll('.table-card').forEach(card => {
            if (card.dataset.free === 'true') {
                card.addEventListener('click', () => {
                    openOrderModal(parseInt(card.dataset.id), parseInt(card.dataset.number), parseInt(card.dataset.seats));
                });
            }
        });
        await loadReadyOrders();
    } catch (err) {
        document.getElementById('hallContainer').innerHTML = `<div class="col-12 text-danger">Ошибка: ${err.message}</div>`;
    }
}

// ---------- 2. Готовые заказы ----------
async function loadReadyOrders() {
    try {
        const resp = await fetch('/api/orders/active/');
        const data = await resp.json();
        const container = document.getElementById('readyContainer');
        if (!data.success || !data.data.length) {
            container.innerHTML = '<p class="text-muted">Нет активных заказов</p>';
            return;
        }
        const readyOrders = data.data.filter(o => o.status === 'ready');
        if (!readyOrders.length) {
            container.innerHTML = '<p class="text-muted">Нет готовых заказов</p>';
            return;
        }
        container.innerHTML = readyOrders.map(order => `
            <div class="col-md-4">
                <div class="card" style="background:rgba(20,20,60,0.75);">
                    <div class="card-body">
                        <h5 class="card-title" style="color:#ffd700;">Заказ для стола ${order.table_number}</h5>
                        <p class="card-text">${order.created_at}</p>
                        <button class="btn btn-warning" onclick="openPayment(${order.id})">Принять оплату</button>
                    </div>
                </div>
            </div>
        `).join('');
    } catch (err) { console.error(err); }
}

// ---------- 3. Открыть модальное окно заказа (с inline onclick) ----------
async function openOrderModal(tableId, tableNumber, maxSeats) {
    currentTableId = tableId;
    currentCart = [];
    try {
        const [dishesRes, catsRes] = await Promise.all([fetch('/api/dishes/'), fetch('/api/categories/')]);
        const dishes = await dishesRes.json();
        const cats = await catsRes.json();
        if (!dishes.success) throw new Error('Не удалось загрузить меню');
        const grouped = {};
        const catMap = {};
        if (cats.success) cats.data.forEach(c => catMap[c.id] = c.name);
        for (let d of dishes.data) {
            const cat = catMap[d.category_id] || 'Без категории';
            if (!grouped[cat]) grouped[cat] = [];
            grouped[cat].push(d);
        }
        let menuHtml = '';
        for (let catName in grouped) {
            menuHtml += `<h6 style="color:#ffd700; margin-top:15px;">${catName}</h6><div class="row g-2">`;
            for (let d of grouped[catName]) {
                menuHtml += `
                    <div class="col-6">
                        <div style="background:rgba(30,30,80,0.6); border-radius:12px; padding:10px;">
                            <div style="color:white;">${d.name}</div>
                            <div style="color:#ffd700;">${d.price} ₽</div>
                            <button class="btn-add-dish" data-id="${d.id}" data-name="${d.name.replace(/'/g, "\\'")}" data-price="${d.price}"
                                    style="margin-top:6px; background:#ffd700; color:#1a1a4a; border:none; border-radius:20px; padding:3px 12px; font-size:12px; cursor:pointer;">
                                ➕ Добавить
                            </button>
                        </div>
                    </div>
                `;
            }
            menuHtml += `</div>`;
        }
        const modalHtml = `
            <div class="modal fade" id="orderModal" tabindex="-1">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content" style="background:rgba(15,15,50,0.98); border:1px solid rgba(255,215,0,0.3); border-radius:16px;">
                        <div class="modal-header">
                            <h5 class="modal-title" style="color:#ffd700;">Заказ для стола ${tableNumber}</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="row">
                                <div class="col-md-7">
                                    <h6 style="color:#ffd700;">Меню</h6>
                                    <div style="max-height:450px; overflow-y:auto;">${menuHtml}</div>
                                </div>
                                <div class="col-md-5">
                                    <h6 style="color:#ffd700;">Корзина</h6>
                                    <div id="cartItems" style="background:rgba(0,0,0,0.3); border-radius:12px; padding:10px; min-height:150px;"></div>
                                    <div class="mt-2"><strong>Итого: <span id="cartTotal">0</span> ₽</strong></div>
                                    <div class="mt-2">
                                        <label>Количество гостей</label>
                                        <input type="number" id="guestCountInput" class="form-control" value="2" min="1" max="${maxSeats}">
                                        <small class="text-muted">Макс. ${maxSeats} гостей</small>
                                    </div>
                                    <button class="btn btn-warning w-100 mt-3" id="submitOrderBtn">Оформить заказ</button>
                                    <button class="btn btn-secondary w-100 mt-2" data-bs-dismiss="modal">Отмена</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        const container = document.getElementById('modalContainer');
        container.innerHTML = modalHtml;
        // Обновляем корзину
        updateCartDisplay();
        // Навешиваем обработчики на кнопки "Добавить" (через dataset, но можно и через onclick, но для надёжности добавим)
        document.querySelectorAll('.btn-add-dish').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const name = btn.dataset.name;
                const price = parseFloat(btn.dataset.price);
                addToCart(id, name, price);
            });
        });
        // Кнопка оформления заказа
        document.getElementById('submitOrderBtn').onclick = () => submitOrder();
        const modal = new bootstrap.Modal(document.getElementById('orderModal'));
        modal.show();
        // Очистка после закрытия
        document.getElementById('orderModal').addEventListener('hidden.bs.modal', () => {
            container.innerHTML = '';
        });
    } catch (err) { alert('Ошибка: ' + err.message); }
}

// ---------- Корзина (глобальные функции) ----------
window.addToCart = function(id, name, price) {
    const existing = currentCart.find(i => i.id === id);
    if (existing) existing.qty++;
    else currentCart.push({ id, name, price, qty: 1 });
    updateCartDisplay();
};
window.removeFromCart = function(id) {
    currentCart = currentCart.filter(i => i.id !== id);
    updateCartDisplay();
};
function updateCartDisplay() {
    const container = document.getElementById('cartItems');
    const totalSpan = document.getElementById('cartTotal');
    if (!container) return;
    if (currentCart.length === 0) {
        container.innerHTML = '<p class="text-center">Корзина пуста</p>';
        if (totalSpan) totalSpan.innerText = '0';
        return;
    }
    let total = 0;
    let html = '';
    for (let item of currentCart) {
        total += item.price * item.qty;
        html += `<div class="d-flex justify-content-between align-items-center mb-2" style="border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:5px;">
            <div>${item.name} x${item.qty}</div>
            <div>${item.price * item.qty} ₽ <button class="btn-remove" data-id="${item.id}" style="background:red; color:white; border:none; border-radius:50%; width:25px;">✕</button></div>
        </div>`;
    }
    container.innerHTML = html;
    if (totalSpan) totalSpan.innerText = total;
    // Обработчики кнопок удаления
    document.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const id = parseInt(btn.dataset.id);
            removeFromCart(id);
        });
    });
}

// ---------- Оформление заказа ----------
async function submitOrder() {
    if (currentCart.length === 0) { alert('Добавьте блюда в корзину'); return; }
    const guestCount = parseInt(document.getElementById('guestCountInput').value) || 1;
    const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));
    try {
        const resp = await fetch('/api/orders/create/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount })
        });
        const data = await resp.json();
        if (data.success) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('orderModal'));
            if (modal) modal.hide();
            await loadTables();
            alert(`Заказ #${data.order_id} оформлен! Сумма: ${data.total} ₽`);
        } else {
            alert('Ошибка: ' + (data.error || 'неизвестная ошибка'));
        }
    } catch (err) { alert('Ошибка сети: ' + err.message); }
}

// ---------- Оплата и чек ----------
window.openPayment = function(orderId) {
    currentOrderId = orderId;
    const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
    modal.show();
    document.getElementById('confirmPayBtn').onclick = () => confirmPayment(orderId);
};
async function confirmPayment(orderId) {
    const method = document.getElementById('paymentMethodSelect').value;
    try {
        const resp = await fetch('/api/orders/pay/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order_id: orderId, payment_method: method })
        });
        const data = await resp.json();
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('paymentModal'))?.hide();
            await showReceipt(orderId, method);
            await loadTables();
        } else {
            alert('Ошибка оплаты: ' + data.error);
        }
    } catch (err) { alert('Ошибка: ' + err.message); }
}
async function showReceipt(orderId, forcedMethod) {
    try {
        const resp = await fetch(`/api/orders/receipt/${orderId}/`);
        const data = await resp.json();
        if (!data.success) return;
        const labels = { cash: 'Наличные', card: 'Карта', qr: 'QR-код' };
        const payment = forcedMethod ? (labels[forcedMethod] || forcedMethod) : data.data.payment_method;
        const order = data.data;
        const itemsHtml = order.items.map(i => `<div style="display:flex; justify-content:space-between;"><span>${i.name} x${i.quantity}</span><span>${i.total} ₽</span></div>`).join('');
        document.getElementById('receiptContent').innerHTML = `
            <div style="text-align:center; margin-bottom:16px;">
                <div style="font-size:18px; font-weight:700;">АИС «Общепит»</div>
                <div style="font-size:12px; color:#666;">Чек № ${order.order_id}</div>
            </div>
            <div style="margin-bottom:12px; font-size:13px;">Стол: ${order.table_number} | ${order.created_at}</div>
            <div style="border-top:1px dashed #ccc; border-bottom:1px dashed #ccc; padding:10px 0; margin-bottom:12px;">${itemsHtml}</div>
            <div style="display:flex; justify-content:space-between; font-weight:700; font-size:16px;">
                <span>ИТОГО:</span><span>${order.total} ₽</span>
            </div>
            <div style="font-size:13px;">Оплата: ${payment}</div>
            <div style="text-align:center; margin-top:16px; font-size:12px;">Спасибо за визит!</div>
        `;
        const modal = new bootstrap.Modal(document.getElementById('receiptModal'));
        modal.show();
        document.getElementById('printReceiptBtn').onclick = () => { window.print(); };
    } catch (err) { console.error(err); }
}

// Запуск
loadTables();
setInterval(loadTables, 30000);
</script>
{% endblock %}
