{% extends 'base.html' %}
{% block title %}Зал ресторана - Тест{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Тест кликабельности столов</h2>
    <div id="test-tables" class="row g-3"></div>
</div>

<script>
    async function loadTestTables() {
        try {
            const resp = await fetch('/api/tables/');
            const data = await resp.json();
            const container = document.getElementById('test-tables');
            if (!data.success || !data.data.length) {
                container.innerHTML = '<div class="col-12 text-danger">Нет данных о столах</div>';
                return;
            }
            let html = '';
            for (let t of data.data) {
                html += `
                    <div class="col-6 col-md-3">
                        <button class="btn btn-primary w-100 py-3 test-table-btn" data-id="${t.id}" data-number="${t.number}" data-status="${t.status}">
                            Стол ${t.number} (${t.status})
                        </button>
                    </div>
                `;
            }
            container.innerHTML = html;
            // Навешиваем обработчики
            document.querySelectorAll('.test-table-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    const number = btn.dataset.number;
                    const status = btn.dataset.status;
                    alert(`Клик по столу ${number}, статус: ${status}, ID: ${id}`);
                });
            });
        } catch (err) {
            document.getElementById('test-tables').innerHTML = `<div class="col-12 text-danger">Ошибка загрузки: ${err.message}</div>`;
        }
    }
    loadTestTables();
</script>
{% endblock %}
