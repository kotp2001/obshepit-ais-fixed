{% extends 'base.html' %}
{% block title %}Зал ресторана{% endblock %}
{% block content %}

<div class="card" style="background:rgba(20,20,60,0.7); border:1px solid rgba(255,215,0,0.2); border-radius:16px;">
    <div class="card-header" style="background:rgba(10,10,40,0.8);">
        <h4 class="mb-0" style="color:#ffd700;">Зал ресторана</h4>
    </div>
    <div class="card-body">
        <div id="tables-list" class="row g-3"></div>
    </div>
</div>

<!-- Модальное окно заказа -->
<div class="modal fade" id="orderModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
        <div class="modal-content" style="background:rgba(15,15,50,0.98); border:1px solid rgba(255,215,0,0.3);">
            <div class="modal-header">
                <h5 class="modal-title" style="color:#ffd700;">Заказ</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-7" id="menu-container"></div>
                    <div class="col-md-5">
                        <h6 style="color:#ffd700;">Корзина</h6>
                        <div id="cart-items" style="min-height:100px; max-height:300px; overflow:auto; background:rgba(0,0,0,0.3); border-radius:10px; padding:10px;"></div>
                        <div class="mt-3"><strong>Итого: <span id="cart-total">0</span> ₽</strong></div>
                        <div class="mt-2">
                            <label>Количество гостей</label>
                            <input type="number" id="guest-count" class="form-control" value="2" min="1" max="10">
                        </div>
                        <button class="btn btn-warning mt-3 w-100" id="submit-order-btn">Оформить заказ</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Глобальные переменные
let currentTableId = null;
let cart = [];

// Функция загрузки столов
async function loadTables() {
    const res = await fetch('/api/tables/');
    const data = await res.json();
    if (!data.success) return;
    const container = document.getElementById('tables-list');
    container.innerHTML = '';
    for (let table of data.data) {
        const free = table.status === 'free';
        const card = document.createElement('div');
        card.className = 'col-6 col-md-3';
        card.innerHTML = `
            <div class="table-card" data-id="${table.id}" data-number="${table.number}" data-seats="${table.seats}" data-free="${free}" style="background:${free ? 'rgba(40,90,40,0.6)' : 'rgba(90,40,40,0.6)'}; border:2px solid ${free ? '#2e7d32' : '#c62828'}; border-radius:16px; padding:15px; text-align:center; cursor:${free ? 'pointer' : 'not-allowed'};">
                <i class="fas fa-utensils" style="color:#ffd700; font-size:24px;"></i>
                <div style="color:white; font-size:20px;">Стол ${table.number}</div>
                <div style="color:rgba(255,255,255,0.6);">${table.seats} мест</div>
                <div style="background:rgba(0,0,0,0.3); color:${free ? '#8bc34a' : '#ef9a9a'}; border-radius:20px; padding:3px 10px; display:inline-block;">${free ? 'Свободен' : (table.status === 'occupied' ? 'Занят' : 'Забронирован')}</div>
            </div>
        `;
        if (free) {
            card.querySelector('.table-card').addEventListener('click', () => openOrder(table.id, table.number, table.seats));
        }
        container.appendChild(card);
    }
}

// Открыть окно заказа
async function openOrder(tableId, tableNumber, maxSeats) {
    currentTableId = tableId;
    cart = [];
    updateCart();

    // Загружаем меню
    const res = await fetch('/api/dishes/');
    const data = await res.json();
    if (!data.success) return;
    const dishes = data.data;
    // Группируем по категориям
    const categories = {};
    for (let d of dishes) {
        if (!categories[d.category]) categories[d.category] = [];
        categories[d.category].push(d);
    }
    let menuHtml = '';
    for (let catName in categories) {
        menuHtml += `<h6 style="color:#ffd700;">${catName}</h6><div class="row g-2">`;
        for (let d of categories[catName]) {
            menuHtml += `
                <div class="col-6">
                    <div style="background:rgba(30,30,80,0.6); border-radius:12px; padding:8px;">
                        <div style="color:white;">${d.name}</div>
                        <div style="color:#ffd700;">${d.price} ₽</div>
                        <button class="btn-add-dish" data-id="${d.id}" data-name="${d.name}" data-price="${d.price}" style="margin-top:5px; background:#ffd700; color:#1a1a4a; border:none; border-radius:20px; padding:2px 12px;">➕ Добавить</button>
                    </div>
                </div>
            `;
        }
        menuHtml += `</div>`;
    }
    document.getElementById('menu-container').innerHTML = menuHtml;

    // Навешиваем обработчики на кнопки "Добавить"
    document.querySelectorAll('.btn-add-dish').forEach(btn => {
        btn.addEventListener('click', (e) => {
            e.stopPropagation();
            const id = parseInt(btn.dataset.id);
            const name = btn.dataset.name;
            const price = parseFloat(btn.dataset.price);
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty++;
            else cart.push({ id, name, price, qty: 1 });
            updateCart();
        });
    });

    // Устанавливаем максимальное количество гостей
    const guestInput = document.getElementById('guest-count');
    guestInput.max = maxSeats;
    if (guestInput.value > maxSeats) guestInput.value = maxSeats;

    const modal = new bootstrap.Modal(document.getElementById('orderModal'));
    modal.show();
}

function updateCart() {
    const container = document.getElementById('cart-items');
    let total = 0;
    if (cart.length === 0) {
        container.innerHTML = '<p class="text-center">Корзина пуста</p>';
        document.getElementById('cart-total').innerText = '0';
        return;
    }
    let html = '';
    cart.forEach((item, idx) => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        html += `
            <div class="d-flex justify-content-between align-items-center mb-2">
                <div>${item.name} x${item.qty}</div>
                <div>${itemTotal} ₽ <button class="btn-remove-cart" data-idx="${idx}" style="background:red; color:white; border:none; border-radius:50%; width:25px;">✕</button></div>
            </div>
        `;
    });
    container.innerHTML = html;
    document.getElementById('cart-total').innerText = total;
    // Обработчики удаления
    document.querySelectorAll('.btn-remove-cart').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const idx = parseInt(btn.dataset.idx);
            cart.splice(idx, 1);
            updateCart();
        });
    });
}

// Оформление заказа
document.getElementById('submit-order-btn').addEventListener('click', async () => {
    if (cart.length === 0) {
        alert('Добавьте блюда в корзину');
        return;
    }
    const guestCount = parseInt(document.getElementById('guest-count').value);
    const items = cart.map(i => ({ dish_id: i.id, quantity: i.qty }));
    const resp = await fetch('/api/orders/create/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount })
    });
    const data = await resp.json();
    if (data.success) {
        alert(`Заказ #${data.order_id} создан! Сумма: ${data.total} ₽`);
        bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
        loadTables(); // обновить столы
    } else {
        alert('Ошибка: ' + data.error);
    }
});

// Загружаем столы при запуске
loadTables();
</script>
{% endblock %}
