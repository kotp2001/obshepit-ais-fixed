{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}
{% block content %}

<div class="card" style="background:rgba(20,20,60,0.7);border:1px solid rgba(255,215,0,0.2);border-radius:16px;">
    <div class="card-header" style="background:rgba(10,10,40,0.8);border-bottom:1px solid rgba(255,215,0,0.2);border-radius:16px 16px 0 0;padding:14px 20px;">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0" style="color:#ffd700;font-weight:700;">
                <i class="fas fa-utensils me-2"></i>Зал ресторана
            </h4>
            <button class="btn btn-warning btn-sm" id="refresh-tables" onclick="loadTables()" style="border-radius:15px;font-weight:600;">
                <i class="fas fa-sync me-1"></i>Обновить
            </button>
        </div>
    </div>
    <div class="card-body" style="padding:20px;">
        <div id="hall-container" class="row g-3">
            <div class="col-12 text-center py-5">
                <div class="spinner-border" style="color:#ffd700;" role="status"></div>
                <p class="mt-2" style="color:rgba(255,255,255,0.6);">Загрузка столов...</p>
            </div>
        </div>
    </div>
</div>

<div class="mt-4">
    <h5 style="color:#ffd700;margin-bottom:16px;"><i class="fas fa-bell me-2"></i>Активные заказы</h5>
    <div id="ready-orders-list" class="row g-3">
        <p style="color:rgba(255,255,255,0.4);font-size:13px;">Нет активных заказов</p>
    </div>
</div>

<!-- Модальное окно заказа -->
<div id="order-modal-container"></div>

<!-- Модальное окно оплаты -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:rgba(20,20,60,0.97);border:1px solid rgba(255,215,0,0.3);">
            <div class="modal-header" style="border-bottom:1px solid rgba(255,255,255,0.15);">
                <h5 class="modal-title" style="color:#ffd700;">Оплата заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p style="color:rgba(255,255,255,0.8);margin-bottom:16px;">Выберите способ оплаты:</p>
                <select id="payment-method" class="form-select mb-3" style="background:rgba(30,30,80,0.9);border:1px solid rgba(255,215,0,0.3);color:white;border-radius:10px;">
                    <option value="cash">💵 Наличные</option>
                    <option value="card">💳 Карта</option>
                    <option value="qr">📱 QR-код</option>
                </select>
                <button id="confirm-pay-btn" class="btn w-100" style="background:#ffd700;color:#1a1a4a;font-weight:700;border-radius:12px;padding:10px;">
                    <i class="fas fa-check me-2"></i>Подтвердить оплату
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно чека -->
<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:white;color:#1a1a4a;border-radius:14px;font-family:monospace;">
            <div class="modal-body" id="receipt-content" style="padding:24px;"></div>
            <div class="modal-footer" style="border-top:1px solid #eee;">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button class="btn btn-warning" onclick="window.print()">🖨️ Печать</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentTableId = null;
let currentTableSeats = 8;
let currentCart = [];
let currentOrderId = null;

// Словарь статусов
const STATUS = {
    'new':     { label: 'Новый',     color: '#6ab0ff', bg: 'rgba(50,130,250,0.2)',  border: 'rgba(50,130,250,0.5)'  },
    'cooking': { label: 'Готовится', color: '#fbb060', bg: 'rgba(250,150,30,0.2)',  border: 'rgba(250,150,30,0.5)'  },
    'ready':   { label: 'Готов',     color: '#5de8a0', bg: 'rgba(40,180,100,0.2)', border: 'rgba(40,180,100,0.5)'  },
    'paid':    { label: 'Оплачен',   color: '#ffd700', bg: 'rgba(255,215,0,0.2)',   border: 'rgba(255,215,0,0.5)'   },
};

// ── ЗАГРУЗКА СТОЛОВ ──────────────────────────────────────────────
async function loadTables() {
    try {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 10000);
        const resp = await fetch('/api/tables/', { signal: controller.signal });
        clearTimeout(timer);
        const data = await resp.json();

        if (!data.success) throw new Error(data.error || 'Ошибка API');

        const container = document.getElementById('hall-container');
        if (!data.data.length) {
            container.innerHTML = '<p class="col-12 text-center" style="color:rgba(255,255,255,0.5);">Столы не найдены</p>';
            return;
        }

        container.innerHTML = data.data.map(table => {
            const free = table.status === 'free';
            const statusLabel = free ? 'Свободен' : table.status === 'occupied' ? 'Занят' : 'Зарезервирован';
            const borderColor = free ? 'rgba(40,200,80,0.5)' : 'rgba(220,60,60,0.5)';
            const bgColor = free ? 'rgba(20,60,30,0.6)' : 'rgba(60,20,20,0.6)';
            const badgeBg = free ? 'rgba(40,180,80,0.3)' : 'rgba(210,50,50,0.3)';
            const badgeColor = free ? '#5de8a0' : '#f87171';
            const cursor = free ? 'pointer' : 'not-allowed';
            const opacity = free ? '1' : '0.6';

            return '<div class="col-6 col-md-3">' +
                '<div class="table-card" data-id="' + table.id + '" data-number="' + table.number + '" data-seats="' + table.seats + '" data-free="' + free + '" ' +
                'style="background:' + bgColor + ';border:2px solid ' + borderColor + ';border-radius:16px;padding:18px 12px;text-align:center;cursor:' + cursor + ';opacity:' + opacity + ';transition:transform .15s,box-shadow .15s;min-height:130px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;">' +
                '<i class="fas fa-utensils" style="color:#ffd700;font-size:20px;"></i>' +
                '<div style="color:white;font-size:18px;font-weight:700;">Стол ' + table.number + '</div>' +
                '<div style="color:rgba(255,255,255,0.6);font-size:12px;">' + table.seats + ' мест</div>' +
                '<div style="background:' + badgeBg + ';color:' + badgeColor + ';border:1px solid ' + badgeColor + ';padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;">' + statusLabel + '</div>' +
                '</div></div>';
        }).join('');

        // Вешаем клики только на свободные столы
        document.querySelectorAll('.table-card').forEach(card => {
            if (card.dataset.free === 'true') {
                card.addEventListener('mouseenter', () => {
                    card.style.transform = 'translateY(-3px)';
                    card.style.boxShadow = '0 8px 24px rgba(0,0,0,0.4)';
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = '';
                    card.style.boxShadow = '';
                });
                card.addEventListener('click', () => {
                    openOrderModal(
                        parseInt(card.dataset.id),
                        parseInt(card.dataset.number),
                        parseInt(card.dataset.seats)
                    );
                });
            }
        });

        await loadActiveOrders();
    } catch (err) {
        document.getElementById('hall-container').innerHTML =
            '<div class="col-12 text-center p-4">' +
            '<p style="color:#f87171;"><i class="fas fa-exclamation-triangle me-2"></i>Ошибка: ' + err.message + '</p>' +
            '<button onclick="loadTables()" class="btn btn-warning mt-2" style="border-radius:15px;">Повторить</button></div>';
    }
}

// ── АКТИВНЫЕ ЗАКАЗЫ ──────────────────────────────────────────────
async function loadActiveOrders() {
    try {
        const resp = await fetch('/api/orders/active/');
        const data = await resp.json();
        const container = document.getElementById('ready-orders-list');

        if (!data.success || !data.data.length) {
            container.innerHTML = '<p style="color:rgba(255,255,255,0.4);font-size:13px;">Нет активных заказов</p>';
            return;
        }

        container.innerHTML = data.data.map(order => {
            const st = STATUS[order.status] || { label: order.status, color: '#fff', bg: 'rgba(80,80,80,0.2)', border: 'rgba(80,80,80,0.5)' };
            const items = (order.items || []).map(i => i.dish_name + ' x' + i.quantity).join(', ') || '—';
            const time = addHours(order.created_at, 2);
            const isReady = order.status === 'ready';

            return '<div class="col-md-4">' +
                '<div style="background:rgba(20,20,60,0.75);border:2px solid ' + st.border + ';border-radius:16px;padding:16px;">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
                '<span style="color:#ffd700;font-weight:700;font-size:16px;">Стол ' + order.table_number + '</span>' +
                '<span style="background:' + st.bg + ';color:' + st.color + ';border:1px solid ' + st.color + ';padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;">' + st.label + '</span>' +
                '</div>' +
                '<div style="color:rgba(255,255,255,0.55);font-size:12px;margin-bottom:6px;"><i class="fas fa-clock me-1"></i>' + time + '</div>' +
                '<div style="color:rgba(255,255,255,0.7);font-size:12px;margin-bottom:12px;">' + items + '</div>' +
                (isReady ? '<button onclick="openPayment(' + order.id + ')" style="width:100%;background:#ffd700;color:#1a1a4a;border:none;border-radius:10px;padding:8px;font-weight:700;cursor:pointer;"><i class="fas fa-cash-register me-1"></i>Принять оплату</button>' : '') +
                '</div></div>';
        }).join('');
    } catch (e) {
        console.error('loadActiveOrders error:', e);
    }
}

// ── МОДАЛ ЗАКАЗА ─────────────────────────────────────────────────
async function openOrderModal(tableId, tableNumber, tableSeats) {
    currentTableId = tableId;
    currentTableSeats = tableSeats || 8;
    currentCart = [];

    try {
        const [dishResp, catResp] = await Promise.all([
            fetch('/api/dishes/'),
            fetch('/api/categories/')
        ]);
        const dishData = await dishResp.json();
        const catData  = await catResp.json();

        if (!dishData.success) throw new Error('Ошибка загрузки меню');

        const dishes = dishData.data;
        const cats   = catData.success ? catData.data : [];

        // Строим HTML меню по категориям
        const menuByCategory = cats.map(cat => {
            const catDishes = dishes.filter(d => d.category_id === cat.id);
            if (!catDishes.length) return '';
            return '<div class="mb-3">' +
                '<h6 style="color:#ffd700;font-weight:700;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,215,0,0.2);">' + cat.name + '</h6>' +
                '<div class="row g-2">' +
                catDishes.map(d => {
                    return '<div class="col-6">' +
                    '<div class="dish-btn" data-id="' + d.id + '" data-name="' + d.name + '" data-price="' + d.price + '" ' +
                    'style="background:rgba(30,30,80,0.6);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px;cursor:pointer;transition:border-color .15s;">' +
                    '<div style="font-weight:600;color:white;font-size:14px;">' + d.name + '</div>' +
                    '<div style="color:#ffd700;font-size:13px;">' + d.price + ' ₽</div>' +
                    '</div></div>';
                }).join('') +
                '</div></div>';
        }).join('');

        const modalHtml = '<div class="modal fade" id="orderModal" tabindex="-1">' +
            '<div class="modal-dialog modal-xl">' +
            '<div class="modal-content" style="background:rgba(15,15,50,0.98);border:1px solid rgba(255,215,0,0.3);border-radius:16px;">' +
            '<div class="modal-header" style="border-bottom:1px solid rgba(255,255,255,0.15);">' +
            '<h5 class="modal-title" style="color:#ffd700;"><i class="fas fa-utensils me-2"></i>Заказ для стола ' + tableNumber + '</h5>' +
            '<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>' +
            '</div>' +
            '<div class="modal-body" style="padding:20px;">' +
            '<div class="row g-3">' +
            '<div class="col-md-7">' +
            '<h6 style="color:#ffd700;margin-bottom:14px;">Меню</h6>' +
            '<div style="max-height:450px;overflow-y:auto;padding-right:4px;">' + menuByCategory + '</div>' +
            '</div>' +
            '<div class="col-md-5">' +
            '<h6 style="color:#ffd700;margin-bottom:14px;">Корзина</h6>' +
            '<div id="cart-items" style="min-height:120px;max-height:300px;overflow-y:auto;margin-bottom:14px;"></div>' +
            '<div style="border-top:1px solid rgba(255,255,255,0.15);padding-top:12px;margin-bottom:12px;">' +
            '<div style="display:flex;justify-content:space-between;color:white;font-weight:700;font-size:16px;">' +
            '<span>Итого:</span><span id="cart-total" style="color:#ffd700;">0 ₽</span>' +
            '</div></div>' +
            '<label style="color:rgba(255,255,255,0.8);font-size:13px;margin-bottom:6px;">Количество гостей</label>' +
            '<input type="number" id="guest-count" class="form-control mb-3" value="2" min="1" max="' + tableSeats + '" ' +
            'style="background:rgba(30,30,80,0.9);border:1px solid rgba(255,215,0,0.3);color:white;border-radius:10px;">' +
            '<small style="color:rgba(255,215,0,0.6);font-size:11px;display:block;margin-top:-10px;margin-bottom:12px;">Макс. ' + tableSeats + ' гостей</small>' +
            '<button onclick="submitOrder()" id="submit-order-btn" class="btn w-100 mb-2" ' +
            'style="background:#ffd700;color:#1a1a4a;font-weight:700;border-radius:12px;padding:10px;">' +
            '<i class="fas fa-check me-2"></i>Оформить заказ</button>' +
            '<button class="btn w-100" data-bs-dismiss="modal" ' +
            'style="background:rgba(80,80,80,0.4);color:rgba(255,255,255,0.7);border-radius:12px;padding:10px;">Отмена</button>' +
            '</div></div></div></div></div></div>';

        const container = document.getElementById('order-modal-container');
        container.innerHTML = modalHtml;
        updateCart();

        const modalEl = document.getElementById('orderModal');
        const modal = new bootstrap.Modal(modalEl);

        // Вешаем клик ДО show() — Bootstrap не переносит элемент, поэтому это безопасно
        modalEl.addEventListener('click', e => {
            const btn = e.target.closest('.dish-btn');
            if (btn) {
                btn.style.borderColor = 'rgba(255,215,0,0.4)';
                setTimeout(() => { if(btn) btn.style.borderColor = 'rgba(255,255,255,0.1)'; }, 300);
                addToCart(parseInt(btn.dataset.id), btn.dataset.name, parseFloat(btn.dataset.price));
            }
        });

        modalEl.addEventListener('hidden.bs.modal', () => {
            container.innerHTML = '';
        });
    } catch (err) {
        alert('Ошибка: ' + err.message);
    }
}

// ── КОРЗИНА ──────────────────────────────────────────────────────
function addToCart(id, name, price) {
    const existing = currentCart.find(i => i.id === id);
    if (existing) {
        existing.qty++;
    } else {
        currentCart.push({ id, name, price, qty: 1 });
    }
    updateCart();
}

function removeFromCart(id) {
    currentCart = currentCart.filter(i => i.id !== id);
    updateCart();
}

function updateCart() {
    const container = document.getElementById('cart-items');
    const totalEl   = document.getElementById('cart-total');
    if (!container) return;

    if (!currentCart.length) {
        container.innerHTML = '<p style="color:rgba(255,255,255,0.4);font-size:13px;text-align:center;padding:20px 0;">Корзина пуста</p>';
        if (totalEl) totalEl.textContent = '0 ₽';
        return;
    }

    let total = 0;
    container.innerHTML = currentCart.map(item => {
        total += item.price * item.qty;
        return '<div style="display:flex;justify-content:space-between;align-items:center;background:rgba(30,30,80,0.5);border-radius:10px;padding:8px 12px;margin-bottom:6px;">' +
            '<div><div style="color:white;font-size:13px;font-weight:600;">' + item.name + '</div>' +
            '<div style="color:#ffd700;font-size:12px;">x' + item.qty + ' × ' + item.price + ' ₽</div></div>' +
            '<button onclick="removeFromCart(' + item.id + ')" style="background:rgba(220,60,60,0.5);border:none;color:#f87171;border-radius:8px;padding:4px 10px;cursor:pointer;">✕</button>' +
            '</div>';
    }).join('');
    if (totalEl) totalEl.textContent = total + ' ₽';
}

// ── ОФОРМИТЬ ЗАКАЗ ───────────────────────────────────────────────
async function submitOrder() {
    if (!currentCart.length) { alert('Добавьте блюда в корзину'); return; }

    const guestCount = parseInt(document.getElementById('guest-count').value) || 1;
    const pad = n => String(n).padStart(2, '0');
    const now = new Date();
    const localTime = now.getFullYear() + '-' + pad(now.getMonth()+1) + '-' + pad(now.getDate()) +
        'T' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());

    const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));

    try {
        const resp = await fetch('/api/orders/create/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount, client_time: localTime })
        });
        const data = await resp.json();
        if (data.success) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('orderModal'));
            if (modal) modal.hide();
            await loadTables();
            alert('Заказ #' + data.order_id + ' оформлен! Сумма: ' + data.total + ' ₽');
        } else {
            alert('Ошибка: ' + (data.error || 'неизвестная ошибка'));
        }
    } catch (e) {
        alert('Ошибка сети: ' + e.message);
    }
}

// ── ОПЛАТА ───────────────────────────────────────────────────────
function openPayment(orderId) {
    currentOrderId = orderId;
    const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
    modal.show();
    document.getElementById('confirm-pay-btn').onclick = () => confirmPayment(orderId);
}

async function confirmPayment(orderId) {
    const method = document.getElementById('payment-method').value;
    try {
        const resp = await fetch('/api/orders/pay/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order_id: orderId, payment_method: method })
        });
        const data = await resp.json();
        if (data.success) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
            if (modal) modal.hide();
            await showReceipt(orderId, method);
            await loadTables();
        } else {
            alert('Ошибка оплаты: ' + data.error);
        }
    } catch (e) {
        alert('Ошибка: ' + e.message);
    }
}

// ── ЧЕК ─────────────────────────────────────────────────────────
async function showReceipt(orderId, forcedMethod) {
    try {
        const resp = await fetch('/api/orders/receipt/' + orderId + '/');
        const data = await resp.json();
        if (!data.success) return;

        const labels = { cash: 'Наличные', card: 'Карта', qr: 'QR-код' };
        const payment = forcedMethod ? (labels[forcedMethod] || forcedMethod) : data.data.payment_method;
        const order = data.data;

        const itemsHtml = order.items.map(i =>
            '<div style="display:flex;justify-content:space-between;margin-bottom:6px;">' +
            '<span>' + i.name + ' x' + i.quantity + '</span>' +
            '<span>' + i.total + ' ₽</span></div>'
        ).join('');

        document.getElementById('receipt-content').innerHTML =
            '<div style="text-align:center;margin-bottom:16px;">' +
            '<div style="font-size:18px;font-weight:700;">АИС «Общепит»</div>' +
            '<div style="font-size:12px;color:#666;">Чек № ' + order.order_id + '</div>' +
            '</div>' +
            '<div style="margin-bottom:12px;font-size:13px;color:#666;">' +
            'Стол: ' + order.table_number + ' | ' + order.created_at + '</div>' +
            '<div style="border-top:1px dashed #ccc;border-bottom:1px dashed #ccc;padding:10px 0;margin-bottom:12px;">' +
            itemsHtml + '</div>' +
            '<div style="display:flex;justify-content:space-between;font-weight:700;font-size:16px;margin-bottom:8px;">' +
            '<span>ИТОГО:</span><span>' + order.total + ' ₽</span></div>' +
            '<div style="font-size:13px;color:#666;">Оплата: ' + payment + '</div>' +
            '<div style="text-align:center;margin-top:16px;font-size:12px;color:#999;">Спасибо за визит!</div>';

        const modal = new bootstrap.Modal(document.getElementById('receiptModal'));
        modal.show();
    } catch (e) {
        console.error('showReceipt error:', e);
    }
}

// ── УТИЛИТЫ ──────────────────────────────────────────────────────
function addHours(timeStr, hours) {
    if (!timeStr || !timeStr.includes(':')) return timeStr || '';
    const parts = timeStr.split(':');
    const h = (parseInt(parts[0]) + hours) % 24;
    return String(h).padStart(2,'0') + ':' + parts[1];
}

// ── ЗАПУСК ───────────────────────────────────────────────────────
loadTables();
setInterval(loadTables, 30000);
</script>
{% endblock %}
