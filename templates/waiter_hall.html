<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зал ресторана - Официант</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: radial-gradient(ellipse at 30% 20%, #0a0f2a, #02030a);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h2, h5 {
            color: #ffd700;
        }
        .hall-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .table-card {
            background: rgba(15, 20, 45, 0.7);
            border: 1px solid rgba(255, 215, 0, 0.4);
            border-radius: 20px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .table-card:hover {
            transform: scale(1.02);
            border-color: #ffd700;
            background: rgba(30, 40, 70, 0.8);
        }
        .table-number {
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
        }
        .table-seats {
            font-size: 14px;
            color: #ccc;
        }
        .status {
            font-size: 13px;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
            margin-top: 8px;
        }
        .status-free { background: #2e7d32; color: white; }
        .status-occupied { background: #c62828; color: white; }
        .status-reserved { background: #f9a825; color: black; }
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .order-card {
            background: rgba(10, 12, 32, 0.8);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 16px;
            padding: 15px;
        }
        .btn-gold {
            background: #ffd700;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            width: 100%;
            margin-top: 10px;
        }
        .btn-gold:hover {
            background: #ffed66;
            transform: scale(1.02);
        }
        .dish-item {
            background: rgba(30,35,70,0.7);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .cart-item {
            background: rgba(20,25,55,0.6);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        footer {
            margin-top: 40px;
            text-align: center;
            border-top: 1px solid rgba(255,215,0,0.3);
            padding-top: 15px;
            font-size: 12px;
            color: #ffd700;
        }
        @media (max-width: 900px) {
            .hall-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 500px) {
            .hall-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center">
        <h2><i class="fas fa-utensils"></i> Зал ресторана</h2>
        <button class="btn-gold" onclick="loadTables()" style="width: auto;"><i class="fas fa-sync"></i> Обновить</button>
    </div>

    <div id="hall-container" class="hall-grid">
        <div class="text-center" style="grid-column:1/-1;">Загрузка столов...</div>
    </div>

    <div class="mt-4">
        <h5><i class="fas fa-bell"></i> Блюда готовы / ожидают оплаты</h5>
        <div id="ready-orders-list" class="orders-grid">
            <p style="color:rgba(255,255,255,0.5);">Нет заказов</p>
        </div>
    </div>

    <div id="order-modal-container"></div>

    <!-- Модалка оплаты -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background: #1a1a3a; color:white;">
                <div class="modal-header">
                    <h5 class="modal-title text-warning">Оплата заказа</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select id="payment-method" class="form-select mb-3">
                        <option value="cash">Наличные</option>
                        <option value="card">Карта</option>
                        <option value="qr">QR-код</option>
                    </select>
                    <button id="confirm-pay-btn" class="btn-gold">Подтвердить оплату</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка чека -->
    <div class="modal fade" id="receiptModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="background:white; color:black;">
                <div class="modal-body" id="receipt-content"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                    <button class="btn btn-warning" onclick="window.print()">Печать</button>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>АИС «Общепит» — Автоматизированная информационная система управления рестораном</p>
    <p><a href="/help/">Руководство пользователя</a> | <a href="/docs/">Регламенты</a> | <a href="/maintenance-log/">Журнал ТО</a> | <a href="https://forms.yandex.ru/u/69f11c7990fa7b3c1459172e" target="_blank">Обратная связь</a></p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentTableId = null;
    let currentTableSeats = 8;
    let currentCart = [];
    let currentOrderId = null;

    // Загрузка столов
    async function loadTables() {
        try {
            const resp = await fetch('/api/tables/');
            const data = await resp.json();
            if (!data.success) throw new Error(data.error);
            const container = document.getElementById('hall-container');
            if (!data.data.length) {
                container.innerHTML = '<div>Нет столов</div>';
                return;
            }
            container.innerHTML = data.data.map(table => {
                const free = table.status === 'free';
                let statusClass = 'status-occupied';
                let statusText = 'Занят';
                if (free) { statusClass = 'status-free'; statusText = 'Свободен'; }
                else if (table.status === 'reserved') { statusClass = 'status-reserved'; statusText = 'Забронирован'; }
                return `
                    <div class="table-card" data-id="${table.id}" data-free="${free}">
                        <div class="table-number">Стол ${table.number}</div>
                        <div class="table-seats">${table.seats} мест</div>
                        <div class="status ${statusClass}">${statusText}</div>
                    </div>
                `;
            }).join('');
            // Клик по столу, только если свободен
            document.querySelectorAll('.table-card').forEach(card => {
                const free = card.dataset.free === 'true';
                if (free) {
                    card.style.cursor = 'pointer';
                    card.onclick = () => {
                        const id = parseInt(card.dataset.id);
                        const number = parseInt(card.querySelector('.table-number').innerText.split(' ')[1]);
                        const seats = parseInt(card.querySelector('.table-seats').innerText);
                        openOrderModal(id, number, seats);
                    };
                } else {
                    card.style.cursor = 'not-allowed';
                    card.onclick = null;
                }
            });
            await loadActiveOrders();
        } catch(e) {
            document.getElementById('hall-container').innerHTML = `<div class="text-danger">Ошибка: ${e.message}</div>`;
        }
    }

    // Загрузка готовых заказов (статус ready)
    async function loadActiveOrders() {
        try {
            const resp = await fetch('/api/orders/active/');
            const data = await resp.json();
            const container = document.getElementById('ready-orders-list');
            if (!data.success || !data.data.length) {
                container.innerHTML = '<p>Нет заказов</p>';
                return;
            }
            const readyOrders = data.data.filter(o => o.status === 'ready');
            if (!readyOrders.length) {
                container.innerHTML = '<p>Нет заказов для оплаты</p>';
                return;
            }
            container.innerHTML = readyOrders.map(order => {
                const items = (order.items || []).map(i => `${i.dish_name} x${i.quantity}`).join(', ');
                return `
                    <div class="order-card" data-order-id="${order.id}">
                        <div><strong>Стол ${order.table_number}</strong> <span class="badge bg-success">Готов</span></div>
                        <div class="small mt-1">${order.created_at}</div>
                        <div class="small">${items}</div>
                        <button class="btn-gold pay-btn" data-order-id="${order.id}">Принять оплату</button>
                    </div>
                `;
            }).join('');
            // Назначаем обработчики на кнопки
            document.querySelectorAll('.pay-btn').forEach(btn => {
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const oid = parseInt(btn.getAttribute('data-order-id'));
                    openPayment(oid);
                };
            });
        } catch(e) { console.error(e); }
    }

    // Модалка заказа
    async function openOrderModal(tableId, tableNumber, seats) {
        currentTableId = tableId;
        currentTableSeats = seats;
        currentCart = [];
        try {
            const [dishesRes, catsRes] = await Promise.all([fetch('/api/dishes/'), fetch('/api/categories/')]);
            const dishes = await dishesRes.json();
            const cats = await catsRes.json();
            if (!dishes.success) throw new Error('Нет меню');
            let menuHtml = '';
            for (let cat of cats.data) {
                const catDishes = dishes.data.filter(d => d.category_id === cat.id);
                if (!catDishes.length) continue;
                menuHtml += `<h6 class="text-warning mt-2">${cat.name}</h6><div class="row g-2">`;
                catDishes.forEach(d => {
                    menuHtml += `
                        <div class="col-6">
                            <div class="dish-item" data-id="${d.id}" data-name="${d.name}" data-price="${d.price}">
                                <strong>${d.name}</strong><br>${d.price} ₽
                            </div>
                        </div>
                    `;
                });
                menuHtml += `</div>`;
            }
            const modalHtml = `
                <div class="modal fade" id="orderModal" tabindex="-1">
                    <div class="modal-dialog modal-xl">
                        <div class="modal-content" style="background:#1a1a3a; color:white;">
                            <div class="modal-header">
                                <h5 class="modal-title text-warning">Заказ стола ${tableNumber}</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body row">
                                <div class="col-md-7">
                                    <h6>Меню</h6>
                                    <div style="max-height:400px; overflow-y:auto;">${menuHtml}</div>
                                </div>
                                <div class="col-md-5">
                                    <h6>Корзина</h6>
                                    <div id="cart-items" style="min-height:100px;"></div>
                                    <div class="mt-2"><strong>Итого: <span id="cart-total">0</span> ₽</strong></div>
                                    <label class="mt-2">Гостей (макс. ${seats})</label>
                                    <input type="number" id="guest-count" class="form-control" value="2" min="1" max="${seats}">
                                    <button class="btn-gold mt-3" onclick="submitOrder()">Оформить заказ</button>
                                    <button class="btn btn-secondary mt-2" data-bs-dismiss="modal">Отмена</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('order-modal-container').innerHTML = modalHtml;
            updateCart();
            const modalEl = document.getElementById('orderModal');
            const modal = new bootstrap.Modal(modalEl);
            modalEl.addEventListener('click', e => {
                const dishDiv = e.target.closest('.dish-item');
                if (dishDiv) {
                    addToCart(parseInt(dishDiv.dataset.id), dishDiv.dataset.name, parseFloat(dishDiv.dataset.price));
                }
            });
            modal.show();
        } catch(e) { alert('Ошибка: '+e.message); }
    }

    function addToCart(id, name, price) {
        const existing = currentCart.find(i => i.id === id);
        if (existing) existing.qty++;
        else currentCart.push({ id, name, price, qty: 1 });
        updateCart();
    }
    function removeFromCart(id) {
        currentCart = currentCart.filter(i => i.id !== id);
        updateCart();
    }
    function updateCart() {
        const container = document.getElementById('cart-items');
        const totalSpan = document.getElementById('cart-total');
        if (!container) return;
        if (!currentCart.length) {
            container.innerHTML = '<p>Корзина пуста</p>';
            totalSpan.innerText = '0';
            return;
        }
        let total = 0;
        container.innerHTML = currentCart.map(item => {
            total += item.price * item.qty;
            return `
                <div class="cart-item">
                    <div><strong>${item.name}</strong><br>${item.qty} x ${item.price}₽</div>
                    <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})">✕</button>
                </div>
            `;
        }).join('');
        totalSpan.innerText = total;
    }

    async function submitOrder() {
        if (!currentCart.length) { alert('Добавьте блюда'); return; }
        let guestCount = parseInt(document.getElementById('guest-count').value) || 1;
        if (guestCount > currentTableSeats) guestCount = currentTableSeats;
        const now = new Date();
        const localTime = now.toISOString().slice(0,19);
        const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));
        try {
            const resp = await fetch('/api/orders/create/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount, client_time: localTime })
            });
            const data = await resp.json();
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
                await loadTables();
                alert(`Заказ #${data.order_id} на сумму ${data.total}₽`);
            } else alert('Ошибка: '+data.error);
        } catch(e) { alert('Ошибка сети'); }
    }

    // Оплата - прямая и простая
    function openPayment(orderId) {
        currentOrderId = orderId;
        const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        modal.show();
        // Убираем старый обработчик
        const btn = document.getElementById('confirm-pay-btn');
        const newBtn = btn.cloneNode(true);
        btn.parentNode.replaceChild(newBtn, btn);
        newBtn.id = 'confirm-pay-btn';
        newBtn.onclick = () => confirmPayment(orderId);
    }

    async function confirmPayment(orderId) {
        const method = document.getElementById('payment-method').value;
        console.log(`Оплата заказа ${orderId}, метод ${method}`);
        try {
            const resp = await fetch('/api/pay-fixed/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId, payment_method: method })
            });
            const data = await resp.json();
            console.log('Ответ:', data);
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                // Показать чек (можно через отдельный запрос)
                await showReceipt(orderId, method);
                await loadTables();
                alert('Оплата прошла успешно!');
            } else {
                alert('Ошибка оплаты: ' + data.error);
            }
        } catch(e) {
            console.error(e);
            alert('Ошибка соединения: ' + e.message);
        }
    }

    async function showReceipt(orderId, method) {
        try {
            const resp = await fetch(`/api/orders/receipt/${orderId}/`);
            const data = await resp.json();
            if (!data.success) throw new Error(data.error);
            const order = data.data;
            const itemsHtml = order.items.map(i => `<div>${i.name} x${i.quantity} = ${i.total}₽</div>`).join('');
            document.getElementById('receipt-content').innerHTML = `
                <div style="text-align:center"><h4>АИС Общепит</h4><small>Чек №${order.order_id}</small></div>
                <hr>${itemsHtml}<hr>
                <div><strong>ИТОГО: ${order.total}₽</strong></div>
                <div>Оплата: ${method === 'cash' ? 'Наличные' : method === 'card' ? 'Карта' : 'QR-код'}</div>
                <div style="text-align:center; margin-top:15px;">Спасибо за заказ!</div>
            `;
            new bootstrap.Modal(document.getElementById('receiptModal')).show();
        } catch(e) { console.error(e); alert('Не удалось загрузить чек'); }
    }

    loadTables();
    setInterval(loadTables, 30000);
</script>
</body>
</html>
