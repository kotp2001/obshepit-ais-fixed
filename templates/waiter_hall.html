{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}

{% block extra_css %}
<style>
    .hall-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        margin-bottom: 32px;
    }
    .table-card {
        background: rgba(15, 20, 45, 0.65);
        backdrop-filter: blur(4px);
        border-radius: 24px;
        padding: 24px 16px;
        text-align: center;
        cursor: pointer;
        transition: 0.25s;
        border: 1px solid rgba(255,215,0,0.3);
    }
    .table-card:hover {
        transform: translateY(-6px);
        border-color: #ffd700;
        box-shadow: 0 0 15px rgba(255,215,0,0.3);
        background: rgba(20,28,55,0.8);
    }
    .table-icon { font-size: 32px; color: #ffd700; }
    .table-number { font-size: 22px; font-weight: 700; color: white; }
    .table-seats { font-size: 13px; color: rgba(255,255,255,0.6); }
    .table-status {
        font-size: 12px;
        font-weight: 600;
        padding: 4px 14px;
        border-radius: 40px;
        background: rgba(0,0,0,0.5);
        border: 1px solid;
        width: fit-content;
        margin-top: 8px;
    }
    .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
    }
    .order-card {
        background: rgba(10,12,32,0.7);
        backdrop-filter: blur(4px);
        border-radius: 20px;
        padding: 18px;
        border: 1px solid rgba(255,215,0,0.25);
    }
    .dish-item {
        background: rgba(30,35,70,0.7);
        border-radius: 16px;
        padding: 12px;
        cursor: pointer;
        transition: 0.15s;
        border: 1px solid rgba(255,255,255,0.1);
    }
    .dish-item:hover {
        border-color: #ffd700;
        background: rgba(50,55,95,0.8);
    }
    .cart-item {
        background: rgba(20,25,55,0.6);
        border-radius: 14px;
        padding: 10px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .btn-gold {
        background: #ffd700;
        color: #0a0f2a;
        font-weight: 700;
        border-radius: 40px;
        padding: 10px 20px;
    }
    @media (max-width: 900px) {
        .hall-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
        .hall-grid { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 style="color:#ffd700;"><i class="fas fa-utensils me-2"></i>Зал ресторана</h2>
    <button class="btn btn-gold" id="refresh-tables" onclick="loadTables()">Обновить</button>
</div>

<div id="hall-container" class="hall-grid">
    <div class="text-center" style="grid-column:1/-1;">Загрузка столов...</div>
</div>

<div class="mt-5">
    <h5 style="color:#ffd700;"><i class="fas fa-bell me-2"></i>Готовые к оплате</h5>
    <div id="ready-orders-list" class="orders-grid mt-3">
        <p style="color:rgba(255,255,255,0.5);">Нет заказов</p>
    </div>
</div>

<div id="order-modal-container"></div>

<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-warning">Оплата заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <select id="payment-method" class="form-select mb-3">
                    <option value="cash">Наличные</option>
                    <option value="card">Карта</option>
                    <option value="qr">QR-код</option>
                </select>
                <button id="confirm-pay-btn" class="btn btn-gold w-100">Подтвердить оплату</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:white; color:#0a0f2a; border-radius: 24px;">
            <div class="modal-body" id="receipt-content" style="padding:24px;"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button class="btn btn-warning" onclick="window.print()">Печать</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
let currentTableId = null;
let currentTableSeats = 8;
let currentCart = [];
let currentOrderId = null;

const STATUS = {
    'ready': { label: 'Готов', color: '#5de8a0', bg: 'rgba(40,180,100,0.2)' },
};

async function loadTables() {
    try {
        const resp = await fetch('/api/tables/');
        const data = await resp.json();
        if (!data.success) throw new Error(data.error);
        const container = document.getElementById('hall-container');
        if (!data.data.length) {
            container.innerHTML = '<div class="text-center" style="grid-column:1/-1;">Нет столов</div>';
            return;
        }
        container.innerHTML = data.data.map(table => {
            const free = table.status === 'free';
            const statusLabel = free ? 'Свободен' : (table.status === 'occupied' ? 'Занят' : 'Зарезервирован');
            const borderColor = free ? '#5de8a0' : '#f87171';
            const cursor = free ? 'pointer' : 'not-allowed';
            return `
                <div class="table-card" data-id="${table.id}" data-number="${table.number}" data-seats="${table.seats}" data-free="${free}"
                     style="opacity:${free?1:0.6}; cursor:${cursor}">
                    <div class="table-icon"><i class="fas fa-utensils"></i></div>
                    <div class="table-number">Стол ${table.number}</div>
                    <div class="table-seats">${table.seats} мест</div>
                    <div class="table-status" style="border-color:${borderColor}; color:${borderColor}">${statusLabel}</div>
                </div>
            `;
        }).join('');
        document.querySelectorAll('.table-card').forEach(card => {
            if (card.dataset.free === 'true') {
                card.addEventListener('click', () => openOrderModal(
                    parseInt(card.dataset.id),
                    parseInt(card.dataset.number),
                    parseInt(card.dataset.seats)
                ));
            }
        });
        await loadActiveOrders();
    } catch(e) {
        document.getElementById('hall-container').innerHTML = `<div class="text-danger">Ошибка: ${e.message}</div>`;
    }
}

async function loadActiveOrders() {
    try {
        const resp = await fetch('/api/orders/active/');
        const data = await resp.json();
        const container = document.getElementById('ready-orders-list');
        if (!data.success || !data.data.length) {
            container.innerHTML = '<p style="color:rgba(255,255,255,0.5);">Нет готовых заказов</p>';
            return;
        }
        const readyOrders = data.data.filter(o => o.status === 'ready');
        if (!readyOrders.length) {
            container.innerHTML = '<p style="color:rgba(255,255,255,0.5);">Нет заказов для оплаты</p>';
            return;
        }
        container.innerHTML = readyOrders.map(order => `
            <div class="order-card">
                <div class="d-flex justify-content-between">
                    <span class="fw-bold text-warning">Стол ${order.table_number}</span>
                    <span class="badge" style="background:#5de8a0; color:#000;">Готов</span>
                </div>
                <div class="small mt-2">${(order.items || []).map(i => `${i.dish_name} x${i.quantity}`).join(', ')}</div>
                <button class="btn btn-gold w-100 mt-3" onclick="openPayment(${order.id})">Принять оплату</button>
            </div>
        `).join('');
    } catch(e) { console.error(e); }
}

async function openOrderModal(tableId, tableNumber, seats) {
    currentTableId = tableId;
    currentTableSeats = seats;
    currentCart = [];
    try {
        const [dishesRes, catsRes] = await Promise.all([fetch('/api/dishes/'), fetch('/api/categories/')]);
        const dishesData = await dishesRes.json();
        const catsData = await catsRes.json();
        if (!dishesData.success) throw new Error('Нет меню');
        const dishes = dishesData.data;
        const cats = catsData.success ? catsData.data : [];
        let menuHtml = '';
        for (let cat of cats) {
            let catDishes = dishes.filter(d => d.category_id === cat.id);
            if (!catDishes.length) continue;
            menuHtml += `<h6 class="text-warning mt-3">${cat.name}</h6><div class="row g-2">`;
            catDishes.forEach(d => {
                menuHtml += `
                    <div class="col-6">
                        <div class="dish-item" data-id="${d.id}" data-name="${d.name}" data-price="${d.price}">
                            <div class="fw-semibold">${d.name}</div>
                            <div class="text-warning">${d.price} ₽</div>
                        </div>
                    </div>
                `;
            });
            menuHtml += `</div>`;
        }
        const modalHtml = `
            <div class="modal fade" id="orderModal" tabindex="-1">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title text-warning">Заказ стола ${tableNumber}</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="row">
                                <div class="col-md-7">
                                    <h6 class="text-warning">Меню</h6>
                                    <div style="max-height:400px; overflow-y:auto;">${menuHtml}</div>
                                </div>
                                <div class="col-md-5">
                                    <h6 class="text-warning">Корзина</h6>
                                    <div id="cart-items" style="min-height:100px;"></div>
                                    <div class="border-top pt-2 mt-2">
                                        <div class="d-flex justify-content-between fw-bold">
                                            <span>Итого:</span>
                                            <span id="cart-total" class="text-warning">0 ₽</span>
                                        </div>
                                    </div>
                                    <label class="mt-2 small">Гостей (макс. ${seats})</label>
                                    <input type="number" id="guest-count" class="form-control" value="2" min="1" max="${seats}" oninput="if(this.value>${seats}) this.value=${seats}; if(this.value<1) this.value=1;">
                                    <button class="btn btn-gold w-100 mt-3" onclick="submitOrder()">Оформить заказ</button>
                                    <button class="btn btn-outline-light w-100 mt-2" data-bs-dismiss="modal">Отмена</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        document.getElementById('order-modal-container').innerHTML = modalHtml;
        updateCart();
        const modalEl = document.getElementById('orderModal');
        modalEl.addEventListener('click', e => {
            const dish = e.target.closest('.dish-item');
            if (dish) {
                addToCart(parseInt(dish.dataset.id), dish.dataset.name, parseFloat(dish.dataset.price));
            }
        });
        new bootstrap.Modal(modalEl).show();
    } catch(e) { alert('Ошибка: '+e.message); }
}

function addToCart(id, name, price) {
    let existing = currentCart.find(i => i.id === id);
    if (existing) existing.qty++;
    else currentCart.push({ id, name, price, qty: 1 });
    updateCart();
}
function removeFromCart(id) {
    currentCart = currentCart.filter(i => i.id !== id);
    updateCart();
}
function updateCart() {
    const container = document.getElementById('cart-items');
    const totalSpan = document.getElementById('cart-total');
    if (!container) return;
    if (!currentCart.length) {
        container.innerHTML = '<p class="text-center text-white-50">Корзина пуста</p>';
        totalSpan.innerText = '0 ₽';
        return;
    }
    let total = 0;
    container.innerHTML = currentCart.map(item => {
        total += item.price * item.qty;
        return `
            <div class="cart-item">
                <div><strong>${item.name}</strong><br><small class="text-warning">x${item.qty} × ${item.price} ₽</small></div>
                <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})">✕</button>
            </div>
        `;
    }).join('');
    totalSpan.innerText = total + ' ₽';
}

async function submitOrder() {
    if (!currentCart.length) { alert('Добавьте блюда'); return; }
    let guestCount = parseInt(document.getElementById('guest-count').value) || 1;
    if (guestCount > currentTableSeats) guestCount = currentTableSeats;
    const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));
    const now = new Date();
    const localTime = now.toISOString().slice(0,19);
    try {
        const resp = await fetch('/api/orders/create/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount, client_time: localTime })
        });
        const data = await resp.json();
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
            await loadTables();
            alert(`Заказ #${data.order_id} на сумму ${data.total} ₽ оформлен`);
        } else alert('Ошибка: ' + data.error);
    } catch(e) { alert('Ошибка сети'); }
}

function openPayment(orderId) {
    currentOrderId = orderId;
    const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
    modal.show();
    document.getElementById('confirm-pay-btn').onclick = () => confirmPayment(orderId);
}
async function confirmPayment(orderId) {
    const method = document.getElementById('payment-method').value;
    try {
        const resp = await fetch('/api/orders/pay/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order_id: orderId, payment_method: method })
        });
        const data = await resp.json();
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
            await showReceipt(orderId, method);
            await loadTables();
        } else alert('Ошибка оплаты: ' + data.error);
    } catch(e) { alert('Ошибка сети'); }
}
async function showReceipt(orderId, method) {
    const resp = await fetch(`/api/orders/receipt/${orderId}/`);
    const data = await resp.json();
    if (!data.success) return;
    const order = data.data;
    const labels = { cash: 'Наличные', card: 'Карта', qr: 'QR-код' };
    const itemsHtml = order.items.map(i => `<div>${i.name} x${i.quantity} = ${i.total} ₽</div>`).join('');
    document.getElementById('receipt-content').innerHTML = `
        <div style="text-align:center"><h4>АИС Общепит</h4><small>Чек №${order.order_id}</small></div>
        <hr>${itemsHtml}<hr>
        <div class="d-flex justify-content-between fw-bold"><span>ИТОГО:</span><span>${order.total} ₽</span></div>
        <div>Оплата: ${labels[method] || method}</div>
        <div class="text-center mt-3">Спасибо за заказ!</div>
    `;
    new bootstrap.Modal(document.getElementById('receiptModal')).show();
}

loadTables();
setInterval(loadTables, 30000);
</script>
{% endblock %}
