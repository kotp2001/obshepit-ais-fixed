{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}

{% block extra_css %}
<style>
    /* Стили только для контента зала – не дублируют фон и плашки */
    .hall-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin: 20px 0;
    }
    .table-card {
        background: rgba(15, 20, 45, 0.7);
        border: 1px solid rgba(255, 215, 0, 0.4);
        border-radius: 20px;
        padding: 16px 12px;
        text-align: center;
        transition: all 0.2s ease;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }
    .table-card:hover {
        transform: translateY(-4px);
        border-color: #ffd700;
        background: rgba(30, 40, 70, 0.8);
        box-shadow: 0 0 12px rgba(255,215,0,0.3);
    }
    .table-icon {
        font-size: 32px;
        color: #ffd700;
    }
    .table-number {
        font-size: 20px;
        font-weight: bold;
        color: white;
    }
    .table-seats {
        font-size: 13px;
        color: rgba(255,255,255,0.6);
    }
    .table-status {
        font-size: 12px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 40px;
        background: rgba(0,0,0,0.5);
        border: 1px solid;
        width: fit-content;
    }
    .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 16px;
    }
    .order-card {
        background: rgba(10, 12, 32, 0.8);
        border: 1px solid rgba(255,215,0,0.3);
        border-radius: 16px;
        padding: 14px;
    }
    .dish-item {
        background: rgba(30,35,70,0.7);
        border-radius: 12px;
        padding: 10px;
        cursor: pointer;
        transition: 0.15s;
        border: 1px solid rgba(255,255,255,0.1);
        margin-bottom: 8px;
    }
    .dish-item:hover {
        border-color: #ffd700;
        background: rgba(50,55,95,0.8);
    }
    .cart-item {
        background: rgba(20,25,55,0.6);
        border-radius: 12px;
        padding: 8px;
        margin-bottom: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .btn-gold {
        background: #ffd700;
        color: #0a0f2a;
        font-weight: bold;
        border: none;
        border-radius: 40px;
        padding: 8px 20px;
        transition: 0.2s;
    }
    .btn-gold:hover {
        background: #ffed66;
        transform: scale(1.02);
    }
    @media (max-width: 900px) {
        .hall-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
        .hall-grid { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
    <h2 class="mb-0" style="color:#ffd700;"><i class="fas fa-utensils me-2"></i>Зал ресторана</h2>
    <button class="btn-gold" onclick="loadTables()"><i class="fas fa-sync-alt me-1"></i>Обновить</button>
</div>

<div id="hall-container" class="hall-grid">
    <div class="text-center" style="grid-column:1/-1; padding:30px;">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2">Загрузка столов...</p>
    </div>
</div>

<div class="mt-4">
    <h5 style="color:#ffd700;"><i class="fas fa-bell me-2"></i>Блюда готовы / ожидают оплаты</h5>
    <div id="ready-orders-list" class="orders-grid">
        <p style="color:rgba(255,255,255,0.5);">Нет активных заказов</p>
    </div>
</div>

<!-- Контейнер для динамических модальных окон -->
<div id="order-modal-container"></div>

<!-- Модальное окно оплаты -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-warning">Оплата заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <select id="payment-method" class="form-select mb-4">
                    <option value="cash">💵 Наличные</option>
                    <option value="card">💳 Карта</option>
                    <option value="qr">📱 QR-код</option>
                </select>
                <button id="confirm-pay-btn" class="btn-gold w-100">Подтвердить оплату</button>
            </div>
        </div>
    </div>
</div>

<!-- Модальное окно чека -->
<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content" style="background:white; color:#0a0f2a; border-radius: 20px; font-family: monospace;">
            <div class="modal-body" id="receipt-content" style="padding:20px;"></div>
            <div class="modal-footer justify-content-center">
                <button class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button class="btn btn-sm btn-warning" onclick="window.print()">🖨️ Печать</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let currentTableId = null;
    let currentTableSeats = 8;
    let currentCart = [];

    // Загрузка столов
    async function loadTables() {
        try {
            const resp = await fetch('/api/tables/');
            const data = await resp.json();
            if (!data.success) throw new Error(data.error || 'Ошибка API');
            const container = document.getElementById('hall-container');
            if (!data.data.length) {
                container.innerHTML = '<div class="text-center" style="grid-column:1/-1;">Столы не найдены</div>';
                return;
            }
            container.innerHTML = data.data.map(table => {
                const free = table.status === 'free';
                const statusLabel = free ? 'Свободен' : (table.status === 'occupied' ? 'Занят' : 'Забронирован');
                const borderColor = free ? '#5de8a0' : '#f87171';
                const cursor = free ? 'pointer' : 'not-allowed';
                return `
                    <div class="table-card" data-id="${table.id}" data-free="${free}" data-number="${table.number}" data-seats="${table.seats}"
                         style="cursor:${cursor}; opacity:${free ? 1 : 0.6};">
                        <div class="table-icon"><i class="fas fa-utensils"></i></div>
                        <div class="table-number">Стол ${table.number}</div>
                        <div class="table-seats">${table.seats} мест</div>
                        <div class="table-status" style="border-color:${borderColor}; color:${borderColor}">${statusLabel}</div>
                    </div>
                `;
            }).join('');
            // Клики только на свободные столы
            document.querySelectorAll('.table-card').forEach(card => {
                if (card.dataset.free === 'true') {
                    card.addEventListener('click', () => {
                        openOrderModal(
                            parseInt(card.dataset.id),
                            parseInt(card.dataset.number),
                            parseInt(card.dataset.seats)
                        );
                    });
                }
            });
            await loadActiveOrders();
        } catch (err) {
            document.getElementById('hall-container').innerHTML = `<div class="text-danger text-center">Ошибка: ${err.message}</div>`;
        }
    }

    // Загрузка заказов со статусом ready
    async function loadActiveOrders() {
        try {
            const resp = await fetch('/api/orders/active/');
            const data = await resp.json();
            const container = document.getElementById('ready-orders-list');
            if (!data.success || !data.data.length) {
                container.innerHTML = '<p style="color:rgba(255,255,255,0.5);">Нет заказов для оплаты</p>';
                return;
            }
            const readyOrders = data.data.filter(order => order.status === 'ready');
            if (!readyOrders.length) {
                container.innerHTML = '<p style="color:rgba(255,255,255,0.5);">Нет готовых заказов</p>';
                return;
            }
            container.innerHTML = readyOrders.map(order => {
                const items = (order.items || []).map(i => `${i.dish_name} x${i.quantity}`).join(', ');
                const time = addHours(order.created_at, 2);
                return `
                    <div class="order-card">
                        <div class="d-flex justify-content-between">
                            <span class="fw-bold text-warning">Стол ${order.table_number}</span>
                            <span class="badge bg-success">Готов</span>
                        </div>
                        <div class="small text-light mt-1">${time}</div>
                        <div class="small text-white-50 mt-1">${items}</div>
                        <button class="btn-gold w-100 mt-2" data-order-id="${order.id}">Принять оплату</button>
                    </div>
                `;
            }).join('');
            document.querySelectorAll('.order-card .btn-gold').forEach(btn => {
                const orderId = parseInt(btn.getAttribute('data-order-id'));
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    openPayment(orderId);
                });
            });
        } catch(e) { console.error(e); }
    }

    // Модальное окно заказа с меню и корзиной
    async function openOrderModal(tableId, tableNumber, seats) {
        currentTableId = tableId;
        currentTableSeats = seats;
        currentCart = [];
        try {
            const [dishesRes, catsRes] = await Promise.all([fetch('/api/dishes/'), fetch('/api/categories/')]);
            const dishes = await dishesRes.json();
            const cats = await catsRes.json();
            if (!dishes.success) throw new Error('Нет меню');
            let menuHtml = '';
            for (let cat of (cats.data || [])) {
                const catDishes = dishes.data.filter(d => d.category_id === cat.id);
                if (!catDishes.length) continue;
                menuHtml += `<h6 class="text-warning mt-2 mb-2">${cat.name}</h6><div class="row g-2 mb-3">`;
                catDishes.forEach(d => {
                    menuHtml += `
                        <div class="col-6">
                            <div class="dish-item" data-id="${d.id}" data-name="${d.name}" data-price="${d.price}">
                                <div class="fw-semibold">${d.name}</div>
                                <div class="text-warning small">${d.price} ₽</div>
                            </div>
                        </div>
                    `;
                });
                menuHtml += `</div>`;
            }
            const modalHtml = `
                <div class="modal fade" id="orderModal" tabindex="-1">
                    <div class="modal-dialog modal-xl">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title text-warning">Заказ для стола ${tableNumber}</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <div class="row">
                                    <div class="col-md-7">
                                        <h6 class="text-warning">Меню</h6>
                                        <div style="max-height: 500px; overflow-y: auto;">${menuHtml}</div>
                                    </div>
                                    <div class="col-md-5">
                                        <h6 class="text-warning">Корзина</h6>
                                        <div id="cart-items" style="min-height: 120px;"></div>
                                        <div class="border-top mt-2 pt-2">
                                            <div class="d-flex justify-content-between fw-bold">
                                                <span>Итого:</span>
                                                <span id="cart-total" class="text-warning">0 ₽</span>
                                            </div>
                                        </div>
                                        <label class="mt-2 small">Количество гостей (макс. ${seats})</label>
                                        <input type="number" id="guest-count" class="form-control my-1" value="2" min="1" max="${seats}" oninput="if(this.value>${seats}) this.value=${seats}; if(this.value<1) this.value=1;">
                                        <button class="btn-gold w-100 mt-3" onclick="submitOrder()">Оформить заказ</button>
                                        <button class="btn btn-outline-light w-100 mt-2" data-bs-dismiss="modal">Отмена</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            const container = document.getElementById('order-modal-container');
            container.innerHTML = modalHtml;
            updateCart();
            const modalEl = document.getElementById('orderModal');
            const modal = new bootstrap.Modal(modalEl);
            modalEl.addEventListener('click', e => {
                const dishDiv = e.target.closest('.dish-item');
                if (dishDiv) {
                    addToCart(parseInt(dishDiv.dataset.id), dishDiv.dataset.name, parseFloat(dishDiv.dataset.price));
                }
            });
            modalEl.addEventListener('hidden.bs.modal', () => container.innerHTML = '');
            modal.show();
        } catch(err) {
            alert('Ошибка загрузки меню: ' + err.message);
        }
    }

    function addToCart(id, name, price) {
        const existing = currentCart.find(i => i.id === id);
        if (existing) existing.qty++;
        else currentCart.push({ id, name, price, qty: 1 });
        updateCart();
    }
    function removeFromCart(id) {
        currentCart = currentCart.filter(i => i.id !== id);
        updateCart();
    }
    function updateCart() {
        const container = document.getElementById('cart-items');
        const totalSpan = document.getElementById('cart-total');
        if (!container) return;
        if (currentCart.length === 0) {
            container.innerHTML = '<p class="text-center text-white-50">Корзина пуста</p>';
            totalSpan.innerText = '0 ₽';
            return;
        }
        let total = 0;
        container.innerHTML = currentCart.map(item => {
            total += item.price * item.qty;
            return `
                <div class="cart-item">
                    <div><span class="fw-semibold">${item.name}</span><br><span class="small text-warning">${item.qty} x ${item.price} ₽</span></div>
                    <button class="btn btn-sm btn-outline-danger" onclick="removeFromCart(${item.id})">✕</button>
                </div>
            `;
        }).join('');
        totalSpan.innerText = total + ' ₽';
    }

    async function submitOrder() {
        if (currentCart.length === 0) { alert('Добавьте блюда в заказ'); return; }
        let guestCount = parseInt(document.getElementById('guest-count').value) || 1;
        if (guestCount > currentTableSeats) guestCount = currentTableSeats;
        const now = new Date();
        const localTime = now.toISOString().slice(0, 19);
        const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));
        try {
            const resp = await fetch('/api/orders/create/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount, client_time: localTime })
            });
            const data = await resp.json();
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
                await loadTables();
                alert(`Заказ #${data.order_id} оформлен! Сумма: ${data.total} ₽`);
            } else {
                alert('Ошибка: ' + data.error);
            }
        } catch(e) { alert('Ошибка сети: ' + e.message); }
    }

    // ----- ОПЛАТА (рабочий эндпоинт /api/pay-fixed/) -----
    function openPayment(orderId) {
        const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        modal.show();
        // Клонируем кнопку, чтобы избежать дублирования обработчиков
        const oldBtn = document.getElementById('confirm-pay-btn');
        const newBtn = oldBtn.cloneNode(true);
        oldBtn.parentNode.replaceChild(newBtn, oldBtn);
        newBtn.id = 'confirm-pay-btn';
        newBtn.onclick = () => confirmPayment(orderId);
    }

    async function confirmPayment(orderId) {
        const method = document.getElementById('payment-method').value;
        console.log(`Оплата заказа ${orderId}, метод ${method}`);
        try {
            const resp = await fetch('/api/pay-fixed/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId, payment_method: method })
            });
            const data = await resp.json();
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                await showReceipt(orderId, method);
                await loadTables();
                alert('Оплата прошла успешно!');
            } else {
                alert('Ошибка оплаты: ' + (data.error || 'неизвестная ошибка'));
            }
        } catch(e) {
            console.error(e);
            alert('Ошибка соединения: ' + e.message);
        }
    }

    async function showReceipt(orderId, method) {
        try {
            const resp = await fetch(`/api/orders/receipt/${orderId}/`);
            const data = await resp.json();
            if (!data.success) throw new Error(data.error);
            const order = data.data;
            const itemsHtml = order.items.map(i => `<div class="d-flex justify-content-between"><span>${i.name} x${i.quantity}</span><span>${i.total} ₽</span></div>`).join('');
            document.getElementById('receipt-content').innerHTML = `
                <div class="text-center mb-3">
                    <h5>АИС «Общепит»</h5>
                    <small>Чек № ${order.order_id}</small>
                </div>
                <div>Стол ${order.table_number} | ${order.created_at}</div>
                <hr>
                ${itemsHtml}
                <hr>
                <div class="d-flex justify-content-between fw-bold"><span>ИТОГО:</span><span>${order.total} ₽</span></div>
                <div>Оплата: ${method === 'cash' ? 'Наличные' : method === 'card' ? 'Карта' : 'QR-код'}</div>
                <div class="text-center mt-3">Спасибо за заказ!</div>
            `;
            new bootstrap.Modal(document.getElementById('receiptModal')).show();
        } catch(e) { console.error(e); alert('Не удалось загрузить чек'); }
    }

    function addHours(timeStr, hours) {
        if (!timeStr) return '';
        let parts = timeStr.split(':');
        if (parts.length < 2) return timeStr;
        let h = (parseInt(parts[0]) + hours) % 24;
        return String(h).padStart(2,'0') + ':' + parts[1];
    }

    loadTables();
    setInterval(loadTables, 30000);
</script>
{% endblock %}
