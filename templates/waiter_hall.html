<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>АИС «Общепит» — Зал ресторана (Официант)</title>
    <!-- Bootstrap 5 (только CSS для сетки и компонентов) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 (иконки, можно убрать, но оставим для кнопок) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Шрифт Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 30% 20%, #0a0f2a, #02030a);
            min-height: 100vh;
            color: #f0f0f0;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Звёздное небо (ваш эталон) */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(2px 2px at 15% 30%, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 75% 45%, #ffeaa7, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 92% 18%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 8% 85%, #ffd966, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 45% 95%, #fff, rgba(0,0,0,0)),
                radial-gradient(3px 3px at 63% 22%, #f9f3d9, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 32% 68%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 88% 77%, #ffd700, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 5% 55%, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50% 12%, #ffecb3, rgba(0,0,0,0));
            background-repeat: no-repeat;
            background-size: 200px 200px, 300px 300px, 150px 150px, 250px 250px, 180px 180px, 220px 220px, 120px 120px, 280px 280px, 140px 140px, 260px 260px;
            opacity: 0.8;
            animation: starsGlow 4s infinite alternate;
        }

        @keyframes starsGlow {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Верхняя панель (navbar) */
        .navbar-custom {
            background: rgba(20, 20, 50, 0.9);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            position: relative;
            z-index: 10;
        }
        .navbar-brand {
            background: #ffd700;
            color: #1a1a4a !important;
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 14px;
            text-decoration: none;
            transition: 0.1s;
        }
        .navbar-brand:hover {
            background: #e6c200;
            transform: translateY(-1px);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 13px;
        }
        .user-name {
            color: rgba(255, 215, 0, 0.8);
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-1px);
        }

        /* Основной контент */
        .content-wrapper {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
            flex: 1 0 auto;
        }

        /* Сетка столов: 4 колонки */
        .hall-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        /* Карточка стола */
        .table-card {
            background: rgba(15, 20, 45, 0.65);
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 18px 12px;
            text-align: center;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 215, 0, 0.3);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .table-card:hover {
            transform: translateY(-4px);
            border-color: #ffd700;
            box-shadow: 0 12px 20px -8px rgba(0,0,0,0.5);
            background: rgba(20, 28, 55, 0.8);
        }
        .table-number {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }
        .table-seats {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
        }
        .table-status {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 12px;
            border-radius: 40px;
            background: rgba(0,0,0,0.5);
            border: 1px solid;
            width: fit-content;
        }

        /* Активные заказы */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 16px;
            margin-top: 12px;
            align-items: stretch;
        }
        .order-card {
            background: rgba(10, 12, 32, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 18px;
            padding: 14px;
            border: 1px solid rgba(255,215,0,0.25);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* Блюдо в меню */
        .dish-item {
            background: rgba(30, 35, 70, 0.7);
            border-radius: 14px;
            padding: 10px;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .dish-item:hover {
            border-color: #ffd700;
            background: rgba(50, 55, 95, 0.8);
        }
        /* Корзина */
        .cart-item {
            background: rgba(20, 25, 55, 0.6);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Кнопки */
        .btn-gold {
            background: #ffd700;
            color: #0a0f2a;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            transition: 0.1s;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-gold:hover {
            background: #ffed66;
            transform: scale(1.02);
        }
        .btn-outline-light {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            border-radius: 40px;
            padding: 8px 16px;
        }
        .btn-outline-light:hover {
            background: rgba(255,255,255,0.1);
        }
        .btn-outline-danger {
            background: transparent;
            border: 1px solid #f87171;
            color: #f87171;
            border-radius: 20px;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn-outline-danger:hover {
            background: rgba(248,113,113,0.2);
        }

        /* Модальные окна (тёмная тема) */
        .modal-content-custom {
            background: rgba(8, 10, 28, 0.98) !important;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,215,0,0.4);
            border-radius: 24px;
            color: #f0f0f0;
        }
        .form-control-custom {
            background: #1a1f3a;
            border: 1px solid #ffd700;
            color: white;
            border-radius: 30px;
            padding: 8px 16px;
        }

        /* Футер */
        .footer {
            background: rgba(20, 20, 50, 0.8);
            margin-top: 30px;
            padding: 12px;
            text-align: center;
            color: #ffd700;
            font-size: 12px;
            border-top: 1px solid rgba(255,215,0,0.2);
            position: relative;
            z-index: 2;
        }
        .footer a {
            color: #ffd700;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }

        /* Адаптив */
        @media (max-width: 900px) {
            .hall-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
        }
        @media (max-width: 500px) {
            .hall-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- Верхняя панель -->
<div class="navbar-custom">
    <a href="/" class="navbar-brand">Главное меню</a>
    <div class="user-info">
        <span class="user-name" id="nav-username"></span>
        <button class="btn-logout" id="logout-btn" style="display: none;">Выйти</button>
    </div>
</div>

<div class="content-wrapper">
    <div class="d-flex justify-content-between align-items-center flex-wrap mb-3">
        <h2 style="color:#ffd700; font-weight: 700; margin:0;">Зал ресторана</h2>
        <button class="btn-gold" id="refresh-tables" onclick="loadTables()">Обновить</button>
    </div>

    <!-- Сетка столов -->
    <div id="hall-container" class="hall-grid">
        <div class="text-center" style="grid-column:1/-1; padding:30px;">
            <div class="spinner-border text-warning" role="status"></div>
            <p class="mt-2">Загрузка столов...</p>
        </div>
    </div>

    <!-- Активные заказы -->
    <div class="mt-4">
        <h5 style="color:#ffd700; margin-bottom: 14px;">Блюда готовы / ожидают оплаты</h5>
        <div id="ready-orders-list" class="orders-grid">
            <p style="color:rgba(255,255,255,0.5);">Нет активных заказов</p>
        </div>
    </div>
</div>

<!-- Футер -->
<div class="footer">
    <div>АИС «Общепит» — Автоматизированная информационная система управления рестораном</div>
    <div style="font-size: 11px; margin-top: 6px;">
        <a href="/help/">Руководство пользователя</a> | 
        <a href="/docs/">Регламенты</a> | 
        <a href="/maintenance-log/">Журнал ТО</a> |
        <a href="https://forms.yandex.ru/u/69f11c7990fa7b3c1459172e" target="_blank">Обратная связь</a>
    </div>
</div>

<!-- Контейнеры для модалок -->
<div id="order-modal-container"></div>
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content modal-content-custom">
            <div class="modal-header border-warning">
                <h5 class="modal-title text-warning">Оплата заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="mb-2">Выберите способ оплаты:</p>
                <select id="payment-method" class="form-select mb-3" style="background:#1a1f3a; border:1px solid #ffd700; color:white; border-radius: 40px;">
                    <option value="cash">Наличные</option>
                    <option value="card">Карта</option>
                    <option value="qr">QR-код</option>
                </select>
                <button id="confirm-pay-btn" class="btn-gold w-100 py-2">Подтвердить оплату</button>
            </div>
        </div>
    </div>
</div>
<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:white; color:#0a0f2a; border-radius: 20px; font-family: monospace;">
            <div class="modal-body" id="receipt-content" style="padding:20px;"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button class="btn btn-warning" onclick="window.print()">Печать</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script>
// --------------------------------------------------------------
// ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
// --------------------------------------------------------------
let currentTableId = null;
let currentTableSeats = 8;
let currentCart = [];      // { id, name, price, qty }
let currentOrderId = null;

// Словарь статусов заказов (для отображения)
const STATUS = {
    'new':     { label: 'Новый',     color: '#6ab0ff', bg: 'rgba(80,130,250,0.2)' },
    'cooking': { label: 'Готовится', color: '#fbb060', bg: 'rgba(250,150,30,0.2)' },
    'ready':   { label: 'Готов',     color: '#5de8a0', bg: 'rgba(40,180,100,0.2)' },
    'paid':    { label: 'Оплачен',   color: '#ffd700', bg: 'rgba(255,215,0,0.2)' },
};

// --------------------------------------------------------------
// ЗАГРУЗКА СТОЛОВ (API /api/tables/)
// --------------------------------------------------------------
async function loadTables() {
    try {
        const resp = await fetch('/api/tables/');
        const data = await resp.json();
        if (!data.success) throw new Error(data.error || 'Ошибка API');
        const container = document.getElementById('hall-container');
        if (!data.data.length) {
            container.innerHTML = '<div class="text-center" style="grid-column:1/-1;">Столы не найдены</div>';
            return;
        }
        // Генерация карточек столов с сеткой 4 колонки
        container.innerHTML = data.data.map(table => {
            const free = table.status === 'free';
            const statusLabel = free ? 'Свободен' : (table.status === 'occupied' ? 'Занят' : 'Зарезервирован');
            const statusBorderColor = free ? '#5de8a0' : '#f87171';
            const statusBg = free ? 'rgba(40,180,80,0.2)' : 'rgba(220,60,60,0.2)';
            const cursor = free ? 'pointer' : 'not-allowed';
            const opacity = free ? '1' : '0.6';
            return `
                <div class="table-card" data-id="${table.id}" data-number="${table.number}" data-seats="${table.seats}" data-free="${free}"
                     style="opacity:${opacity}; cursor:${cursor};">
                    <div class="table-number">Стол ${table.number}</div>
                    <div class="table-seats">${table.seats} мест</div>
                    <div class="table-status" style="border-color:${statusBorderColor}; background:${statusBg}; color:${statusBorderColor}">
                        ${statusLabel}
                    </div>
                </div>
            `;
        }).join('');
        // Вешаем обработчики клика на свободные столы
        document.querySelectorAll('.table-card').forEach(card => {
            if (card.dataset.free === 'true') {
                card.addEventListener('click', () => {
                    openOrderModal(
                        parseInt(card.dataset.id),
                        parseInt(card.dataset.number),
                        parseInt(card.dataset.seats)
                    );
                });
            }
        });
        await loadActiveOrders();
    } catch (err) {
        document.getElementById('hall-container').innerHTML = `
            <div class="text-center" style="grid-column:1/-1; padding:20px;">
                <p style="color:#f87171;">Ошибка: ${err.message}</p>
                <button class="btn-gold mt-2" onclick="loadTables()">Повторить</button>
            </div>`;
    }
}

// --------------------------------------------------------------
// АКТИВНЫЕ ЗАКАЗЫ (со статусами new, cooking, ready)
// --------------------------------------------------------------
async function loadActiveOrders() {
    try {
        const resp = await fetch('/api/orders/active/');
        const data = await resp.json();
        const container = document.getElementById('ready-orders-list');
        if (!data.success || !data.data.length) {
            container.innerHTML = '<p style="color:rgba(255,255,255,0.5);">Нет активных заказов</p>';
            return;
        }
        container.innerHTML = data.data.map(order => {
            const st = STATUS[order.status] || { label: order.status, color: '#fff', bg: 'rgba(80,80,80,0.2)' };
            const items = (order.items || []).map(i => `${i.dish_name} x${i.quantity}`).join(', ') || '—';
            const time = addHours(order.created_at, 2);
            const isReady = order.status === 'ready';
            return `
                <div class="order-card">
                    <div>
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span class="fw-bold text-warning">Стол ${order.table_number}</span>
                            <span style="background:${st.bg}; border:1px solid ${st.color}; color:${st.color}; border-radius:40px; padding:2px 10px; font-size:11px;">${st.label}</span>
                        </div>
                        <div class="small text-light-emphasis mb-2">${time}</div>
                        <div class="small text-white-50 mb-3">${items}</div>
                    </div>
                    ${isReady ? `<button class="btn-gold w-100 mt-2 py-1" onclick="openPayment(${order.id})">Принять оплату</button>` : ''}
                </div>
            `;
        }).join('');
    } catch(e) { console.error(e); }
}

// --------------------------------------------------------------
// ОТКРЫТИЕ МОДАЛЬНОГО ОКНА ЗАКАЗА (меню + корзина)
// --------------------------------------------------------------
async function openOrderModal(tableId, tableNumber, tableSeats) {
    currentTableId = tableId;
    currentTableSeats = tableSeats || 8;
    currentCart = [];

    try {
        // Загрузка блюд и категорий
        const [dishResp, catResp] = await Promise.all([
            fetch('/api/dishes/'),
            fetch('/api/categories/')
        ]);
        const dishData = await dishResp.json();
        const catData = await catResp.json();
        if (!dishData.success) throw new Error('Ошибка загрузки меню');

        const dishes = dishData.data;
        const cats = catData.success ? catData.data : [];

        // Генерация HTML меню по категориям
        const menuHtml = cats.map(cat => {
            const catDishes = dishes.filter(d => d.category_id === cat.id);
            if (!catDishes.length) return '';
            return `
                <div class="mb-3">
                    <h6 class="text-warning border-bottom border-warning pb-2 mb-2">${cat.name}</h6>
                    <div class="row g-2">
                        ${catDishes.map(d => `
                            <div class="col-6">
                                <div class="dish-item" data-id="${d.id}" data-name="${d.name}" data-price="${d.price}">
                                    <div class="fw-semibold">${d.name}</div>
                                    <div class="text-warning small">${d.price} ₽</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');

        const modalHtml = `
            <div class="modal fade" id="orderModal" tabindex="-1">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content modal-content-custom">
                        <div class="modal-header border-warning">
                            <h5 class="modal-title text-warning">Заказ для стола ${tableNumber}</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="row g-3">
                                <div class="col-md-7">
                                    <h6 class="text-warning mb-2">Меню</h6>
                                    <div style="max-height: 480px; overflow-y: auto; padding-right: 6px;">${menuHtml}</div>
                                </div>
                                <div class="col-md-5">
                                    <h6 class="text-warning mb-2">Корзина</h6>
                                    <div id="cart-items" style="min-height: 120px; max-height: 280px; overflow-y: auto;"></div>
                                    <div class="border-top border-warning mt-3 pt-2">
                                        <div class="d-flex justify-content-between fw-bold fs-5">
                                            <span>Итого:</span>
                                            <span id="cart-total" class="text-warning">0 ₽</span>
                                        </div>
                                    </div>
                                    <label class="mt-2 small">Количество гостей (макс. ${tableSeats})</label>
                                    <input type="number" id="guest-count" class="form-control my-2" value="2" min="1" max="${tableSeats}" 
                                           style="background:#1a1f3a; border:1px solid #ffd700; color:white; border-radius: 30px;"
                                           oninput="if(this.value > ${tableSeats}) this.value = ${tableSeats}; if(this.value < 1) this.value = 1;">
                                    <button onclick="submitOrder()" class="btn-gold w-100 mt-3 py-2">Оформить заказ</button>
                                    <button class="btn-outline-light w-100 mt-2" data-bs-dismiss="modal">Отмена</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        const container = document.getElementById('order-modal-container');
        container.innerHTML = modalHtml;
        updateCart();

        const modalEl = document.getElementById('orderModal');
        const modal = new bootstrap.Modal(modalEl);
        // Делегирование кликов по блюдам
        modalEl.addEventListener('click', e => {
            const dishDiv = e.target.closest('.dish-item');
            if (dishDiv) {
                const id = parseInt(dishDiv.dataset.id);
                const name = dishDiv.dataset.name;
                const price = parseFloat(dishDiv.dataset.price);
                addToCart(id, name, price);
            }
        });
        modalEl.addEventListener('hidden.bs.modal', () => container.innerHTML = '');
        modal.show();
    } catch(err) {
        alert('Ошибка: ' + err.message);
    }
}

// --------------------------------------------------------------
// КОРЗИНА
// --------------------------------------------------------------
function addToCart(id, name, price) {
    const existing = currentCart.find(i => i.id === id);
    if (existing) existing.qty++;
    else currentCart.push({ id, name, price, qty: 1 });
    updateCart();
}
function removeFromCart(id) {
    currentCart = currentCart.filter(i => i.id !== id);
    updateCart();
}
function updateCart() {
    const container = document.getElementById('cart-items');
    const totalEl = document.getElementById('cart-total');
    if (!container) return;
    if (!currentCart.length) {
        container.innerHTML = '<p class="text-center text-white-50 py-4">Корзина пуста</p>';
        if (totalEl) totalEl.innerText = '0 ₽';
        return;
    }
    let total = 0;
    container.innerHTML = currentCart.map(item => {
        total += item.price * item.qty;
        return `
            <div class="cart-item">
                <div>
                    <div class="fw-semibold">${item.name}</div>
                    <div class="small text-warning">x${item.qty} × ${item.price} ₽</div>
                </div>
                <button class="btn-outline-danger" onclick="removeFromCart(${item.id})">Удалить</button>
            </div>
        `;
    }).join('');
    if (totalEl) totalEl.innerText = total + ' ₽';
}

// --------------------------------------------------------------
// ОФОРМЛЕНИЕ ЗАКАЗА (POST /api/orders/create/)
// --------------------------------------------------------------
async function submitOrder() {
    if (!currentCart.length) { alert('Добавьте блюда в корзину'); return; }
    let guestCount = parseInt(document.getElementById('guest-count')?.value) || 1;
    if (guestCount > currentTableSeats) guestCount = currentTableSeats;
    if (guestCount < 1) guestCount = 1;

    const pad = n => String(n).padStart(2, '0');
    const now = new Date();
    const localTime = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
    const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));

    try {
        const resp = await fetch('/api/orders/create/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount, client_time: localTime })
        });
        const data = await resp.json();
        if (data.success) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('orderModal'));
            if (modal) modal.hide();
            await loadTables();
            alert(`Заказ #${data.order_id} оформлен! Сумма: ${data.total} ₽`);
        } else {
            alert('Ошибка: ' + (data.error || 'неизвестная ошибка'));
        }
    } catch(e) { alert('Ошибка сети: ' + e.message); }
}

// --------------------------------------------------------------
// ОПЛАТА (POST /api/orders/pay/ — используем тот URL, который работал)
// --------------------------------------------------------------
function openPayment(orderId) {
    currentOrderId = orderId;
    const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
    modal.show();
    // Пересоздаём кнопку, чтобы избежать дублирования обработчика
    const oldBtn = document.getElementById('confirm-pay-btn');
    const newBtn = oldBtn.cloneNode(true);
    oldBtn.parentNode.replaceChild(newBtn, oldBtn);
    newBtn.id = 'confirm-pay-btn';
    newBtn.onclick = () => confirmPayment(orderId);
}

async function confirmPayment(orderId) {
    const method = document.getElementById('payment-method').value;
    try {
        // ВНИМАНИЕ: используем тот же эндпоинт, который работал в вашем старом коде - /api/orders/pay/
        const resp = await fetch('/api/orders/pay/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ order_id: orderId, payment_method: method })
        });
        const data = await resp.json();
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('paymentModal'))?.hide();
            await showReceipt(orderId, method);
            await loadTables();
        } else {
            alert('Ошибка оплаты: ' + data.error);
        }
    } catch(e) {
        console.error(e);
        alert('Ошибка соединения с сервером. Убедитесь, что сервер работает и эндпоинт /api/orders/pay/ доступен.');
    }
}

// --------------------------------------------------------------
// ЧЕК (GET /api/orders/receipt/<id>/)
// --------------------------------------------------------------
async function showReceipt(orderId, forcedMethod) {
    try {
        const resp = await fetch(`/api/orders/receipt/${orderId}/`);
        const data = await resp.json();
        if (!data.success) return;
        const labels = { cash: 'Наличные', card: 'Карта', qr: 'QR-код' };
        const payment = forcedMethod ? (labels[forcedMethod] || forcedMethod) : data.data.payment_method;
        const order = data.data;
        const itemsHtml = order.items.map(i => `
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span>${i.name} x${i.quantity}</span><span>${i.total} ₽</span>
            </div>
        `).join('');
        document.getElementById('receipt-content').innerHTML = `
            <div style="text-align:center; margin-bottom:14px;">
                <div style="font-size:18px; font-weight:700;">АИС «Общепит»</div>
                <div style="font-size:11px;">Чек № ${order.order_id}</div>
            </div>
            <div style="margin-bottom:10px; font-size:12px;">Стол ${order.table_number} | ${order.created_at}</div>
            <div style="border-top:1px dashed #ccc; border-bottom:1px dashed #ccc; padding:8px 0; margin-bottom:10px;">${itemsHtml}</div>
            <div style="display:flex; justify-content:space-between; font-weight:700; font-size:16px; margin-bottom:6px;">
                <span>ИТОГО:</span><span>${order.total} ₽</span>
            </div>
            <div>Оплата: ${payment}</div>
            <div style="text-align:center; margin-top:16px;">Спасибо за визит!</div>
        `;
        new bootstrap.Modal(document.getElementById('receiptModal')).show();
    } catch(e) { console.error(e); }
}

// --------------------------------------------------------------
// УТИЛИТЫ
// --------------------------------------------------------------
function addHours(timeStr, hours) {
    if (!timeStr) return '';
    let parts = timeStr.split(':');
    if (parts.length < 2) return timeStr;
    let h = (parseInt(parts[0]) + hours) % 24;
    return String(h).padStart(2,'0') + ':' + parts[1];
}

// Информация о пользователе из localStorage (если используется)
function setUserInfo() {
    const role = localStorage.getItem('user_role');
    const userName = localStorage.getItem('user_name');
    const logoutBtn = document.getElementById('logout-btn');
    const nameSpan = document.getElementById('nav-username');
    if (role) {
        logoutBtn.style.display = 'block';
        if (userName) nameSpan.textContent = `Вы вошли как ${userName}`;
        else nameSpan.textContent = `Вы вошли как ${role}`;
    } else {
        nameSpan.textContent = '';
    }
}
function logout() {
    localStorage.removeItem('user_role');
    localStorage.removeItem('user_name');
    window.location.href = '/';
}
document.getElementById('logout-btn')?.addEventListener('click', logout);
setUserInfo();

loadTables();
setInterval(loadTables, 30000);
</script>
