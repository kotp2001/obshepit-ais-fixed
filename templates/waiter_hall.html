<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - Зал ресторана - Официант</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        .container {
            position: relative;
            z-index: 1;
            flex: 1 0 auto;
            background: transparent !important;
        }
        .navbar {
            background: rgba(20,20,50,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .navbar-brand {
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffd700 !important;
        }
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-logout:hover { background: #c82333; transform: translateY(-1px); }
        .card {
            background: rgba(30,30,70,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header {
            background: rgba(20,20,50,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 20px;
        }
        .card-body {
            color: white;
            padding: 20px;
        }
        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: transform 0.1s ease;
            border: none;
            cursor: pointer;
        }
        .btn:active { transform: scale(0.97); }
        .btn-warning { background: #ffd700; color: #1a1a4a; }
        .btn-warning:hover { background: #e6c200; transform: translateY(-1px); }
        .btn-primary { background: #1a1a4a; color: white; }
        .btn-primary:hover { background: #2a2a5a; transform: translateY(-1px); }
        .btn-success { background: #2a5a2a; color: white; }
        .btn-success:hover { background: #3a6a3a; transform: translateY(-1px); }
        .btn-danger { background: #dc3545; color: white; }
        .btn-danger:hover { background: #c82333; transform: translateY(-1px); }
        .btn-secondary { background: rgba(100,100,140,0.8); color: white; }
        .form-control {
            background: rgba(50,50,100,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 25px;
            padding: 10px 15px;
        }
        .form-control:focus {
            background: rgba(60,60,110,0.9);
            border-color: #ffd700;
            color: white;
            outline: none;
            box-shadow: 0 0 5px rgba(255,215,0,0.3);
        }
        .footer {
            background: rgba(20,20,50,0.8);
            margin-top: 40px;
            padding: 15px;
            text-align: center;
            color: #ffd700;
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }
        .footer a { color: #ffd700; text-decoration: none; }
        .footer a:hover { text-decoration: underline; }
        .modal-content {
            background: rgba(20,20,60,0.97) !important;
            border: 1px solid rgba(255,215,0,0.3);
        }
        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.2); }
        .modal-body { color: white; pointer-events: all !important; }
        .modal-body .form-label { color: white; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.4s ease forwards; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(30,30,70,0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }
        .admin-card { transition: none; cursor: pointer; }
        .admin-card:hover { transform: none; }
        .admin-card .card-body { transition: none; }
        .admin-card:hover .card-body { background: rgba(50,50,100,0.7); }
        /* Стили зала */
        .container.py-4 { padding-top: 0.75rem !important; padding-bottom: 0.75rem !important; }
        .hall-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 16px; }
        .table-card { background: rgba(15,20,45,0.65); backdrop-filter: blur(4px); border-radius: 20px; padding: 16px 12px; text-align: center; transition: all 0.25s ease; border: 1px solid rgba(255,215,0,0.3); cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .table-card:hover { transform: translateY(-6px); border-color: #ffd700; box-shadow: 0 20px 30px -8px rgba(0,0,0,0.5), 0 0 15px rgba(255,215,0,0.3); background: rgba(20,28,55,0.8); }
        .table-icon { font-size: 28px; color: #ffd700; }
        .table-number { font-size: 20px; font-weight: 700; color: white; }
        .table-seats { font-size: 12px; color: rgba(255,255,255,0.6); }
        .table-status { font-size: 11px; font-weight: 600; padding: 3px 12px; border-radius: 40px; background: rgba(0,0,0,0.5); border: 1px solid; width: fit-content; }
        .orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-top: 8px; }
        .order-card { background: rgba(10,12,32,0.7); backdrop-filter: blur(4px); border-radius: 16px; padding: 12px; border: 1px solid rgba(255,215,0,0.25); }
        .dish-item { background: rgba(30,35,70,0.7); border-radius: 14px; padding: 10px; cursor: pointer !important; transition: 0.15s; border: 1px solid rgba(255,255,255,0.1); pointer-events: all !important; position: relative; z-index: 10; }
        .dish-item:hover { border-color: #ffd700; background: rgba(50,55,95,0.8); }
        .cart-item { background: rgba(20,25,55,0.6); border-radius: 12px; padding: 8px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .btn-gold { background: #ffd700; color: #0a0f2a; font-weight: 700; border: none; border-radius: 40px; padding: 8px 16px; transition: 0.2s; }
        .btn-gold:hover { background: #ffed66; transform: scale(1.02); }
        footer.footer, .footer { margin-top: 16px !important; }
        @media (max-width: 900px) { .hall-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; } }
        @media (max-width: 500px) { .hall-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>
    <nav class="navbar">
        <div class="container">
            <a class="navbar-brand" href="/admin-panel/" id="main-menu-btn" style="background:#ffd700;color:#1a1a4a!important;padding:6px 16px;border-radius:20px;font-weight:700;font-size:14px;display:none;">
                <i class="fas fa-home me-1"></i> Главное меню
            </a>
            <div style="display:flex; align-items:center; gap:12px;">
                <span id="nav-username" style="color:rgba(255,215,0,0.8); font-size:13px; display:none;">
                    <i class="fas fa-user-circle me-1"></i><span id="nav-username-text"></span>
                </span>
                <button class="btn-logout" onclick="logout()" id="logout-btn" style="display: none;">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center flex-wrap mb-2">
            <h2 style="color:#ffd700; font-weight: 700; font-size: 1.8rem;">
                <i class="fas fa-utensils me-2"></i>Зал ресторана
            </h2>
            <button class="btn btn-gold" id="refresh-tables" onclick="loadTables()">
                <i class="fas fa-sync me-1"></i>Обновить
            </button>
        </div>

        <div id="hall-container" class="hall-grid">
            <div class="text-center" style="grid-column:1/-1; padding:30px;">
                <div class="spinner-border text-warning" role="status"></div>
                <p class="mt-2">Загрузка столов...</p>
            </div>
        </div>

        <div class="mt-3">
            <h5 style="color:#ffd700; margin-bottom: 12px; font-size: 1.25rem;"><i class="fas fa-bell me-2"></i>Блюда готовы / ожидают оплаты</h5>
            <div id="ready-orders-list" class="orders-grid">
                <p style="color:rgba(255,255,255,0.5);">Нет активных заказов</p>
            </div>
        </div>

        <div id="order-modal-container"></div>

        <!-- Модальное окно оплаты -->
        <div class="modal fade" id="paymentModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title text-warning">Оплата заказа</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <p class="mb-3">Выберите способ оплаты:</p>
                        <select id="payment-method" class="form-select mb-4">
                            <option value="cash">💵 Наличные</option>
                            <option value="card">💳 Карта</option>
                            <option value="qr">📱 QR-код</option>
                        </select>
                        <button id="confirm-pay-btn" class="btn btn-gold w-100 py-2">Подтвердить оплату</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Модальное окно чека -->
        <div class="modal fade" id="receiptModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content" style="background:white; color:#0a0f2a; border-radius: 24px; font-family: monospace;">
                    <div class="modal-body" id="receipt-content" style="padding:20px;"></div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                        <button class="btn btn-warning" onclick="window.print()">🖨️ Печать</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="footer">
        <div class="container">
            <p class="mb-0">АИС «Общепит» — Автоматизированная информационная система управления рестораном</p>
            <p class="mb-0 mt-1" style="font-size: 11px;">
                <a href="/help/">Руководство пользователя</a> | 
                <a href="/docs/">Регламенты</a> | 
                <a href="/maintenance-log/">Журнал ТО</a> |
                <a href="https://forms.yandex.ru/u/69f11c7990fa7b3c1459172e" target="_blank">Обратная связь</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();
        
        function checkAuth() {
            const role = localStorage.getItem('user_role');
            const logoutBtn = document.getElementById('logout-btn');
            const navUser = document.getElementById('nav-username');
            const navUserText = document.getElementById('nav-username-text');
            const mainMenuBtn = document.getElementById('main-menu-btn');
            const uname = localStorage.getItem('user_name');
            if (role) {
                logoutBtn.style.display = 'block';
                if (uname && navUser) { navUser.style.display='flex'; navUserText.textContent='Вы вошли как ' + uname; }
                if (role === 'admin' && mainMenuBtn) mainMenuBtn.style.display = 'inline-flex';
            }
        }
        function logout() {
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            window.location.href = '/';
        }
        checkAuth();

        // Основная логика зала
        let currentTableId = null;
        let currentTableSeats = 8;
        let currentCart = [];
        let currentOrderId = null;

        const STATUS = {
            'new':     { label: 'Новый',     color: '#6ab0ff', bg: 'rgba(80,130,250,0.2)',  border: '#6ab0ff' },
            'cooking': { label: 'Готовится', color: '#fbb060', bg: 'rgba(250,150,30,0.2)',  border: '#fbb060' },
            'ready':   { label: 'Готов',     color: '#5de8a0', bg: 'rgba(40,180,100,0.2)', border: '#5de8a0' },
            'paid':    { label: 'Оплачен',   color: '#ffd700', bg: 'rgba(255,215,0,0.2)',   border: '#ffd700' },
        };

        async function loadTables() {
            try {
                const resp = await fetch('/api/tables/');
                const data = await resp.json();
                if (!data.success) throw new Error(data.error || 'Ошибка API');
                const container = document.getElementById('hall-container');
                if (!data.data.length) {
                    container.innerHTML = '<div class="text-center" style="grid-column:1/-1;">Столы не найдены</div>';
                    return;
                }
                container.innerHTML = data.data.map(table => {
                    const free = table.status === 'free';
                    const statusLabel = free ? 'Свободен' : (table.status === 'occupied' ? 'Занят' : 'Зарезервирован');
                    const statusBorderColor = free ? '#5de8a0' : '#f87171';
                    const statusBg = free ? 'rgba(40,180,80,0.2)' : 'rgba(220,60,60,0.2)';
                    const cursor = free ? 'pointer' : 'not-allowed';
                    const opacity = free ? '1' : '0.6';
                    return `
                        <div class="table-card" data-id="${table.id}" data-number="${table.number}" data-seats="${table.seats}" data-free="${free}"
                             style="opacity:${opacity}; cursor:${cursor};">
                            <div class="table-icon"><i class="fas fa-utensils"></i></div>
                            <div class="table-number">Стол ${table.number}</div>
                            <div class="table-seats"><i class="fas fa-user-friends me-1"></i>${table.seats} мест</div>
                            <div class="table-status" style="border-color:${statusBorderColor}; background:${statusBg}; color:${statusBorderColor}">
                                ${statusLabel}
                            </div>
                        </div>
                    `;
                }).join('');
                document.querySelectorAll('.table-card').forEach(card => {
                    if (card.dataset.free === 'true') {
                        card.addEventListener('click', () => {
                            openOrderModal(parseInt(card.dataset.id), parseInt(card.dataset.number), parseInt(card.dataset.seats));
                        });
                    }
                });
                await loadActiveOrders();
            } catch (err) {
                document.getElementById('hall-container').innerHTML = `
                    <div class="text-center" style="grid-column:1/-1; padding:20px;">
                        <p style="color:#f87171;"><i class="fas fa-exclamation-triangle me-2"></i>Ошибка: ${err.message}</p>
                        <button onclick="loadTables()" class="btn btn-gold mt-2">Повторить</button>
                    </div>`;
            }
        }

        async function loadActiveOrders() {
            try {
                const resp = await fetch('/api/orders/active/');
                const data = await resp.json();
                const container = document.getElementById('ready-orders-list');
                if (!data.success || !data.data.length) {
                    container.innerHTML = '<p style="color:rgba(255,255,255,0.5); grid-column:1/-1;">Нет активных заказов</p>';
                    return;
                }
                container.innerHTML = data.data.map(order => {
                    const st = STATUS[order.status] || { label: order.status, color: '#fff', border: '#aaa' };
                    const items = (order.items || []).map(i => i.dish_name + ' x' + i.quantity).join(', ') || '—';
                    const time = addHours(order.created_at, 2);
                    const isReady = order.status === 'ready';
                    return `
                        <div class="order-card">
                            <div class="d-flex justify-content-between align-items-center mb-1">
                                <span class="fw-bold text-warning" style="font-size:14px;">Стол ${order.table_number}</span>
                                <span style="background:${st.bg}; border:1px solid ${st.color}; color:${st.color}; border-radius:40px; padding:2px 10px; font-size:11px;">${st.label}</span>
                            </div>
                            <div class="small text-light-emphasis mb-1" style="font-size:11px;"><i class="fas fa-clock me-1"></i>${time}</div>
                            <div class="small text-white-50 mb-2" style="font-size:11px;">${items}</div>
                            ${isReady ? `<button class="btn btn-gold w-100 py-1" style="font-size:12px;" data-order-id="${order.id}"><i class="fas fa-cash-register me-1"></i>Принять оплату</button>` : ''}
                        </div>
                    `;
                }).join('');
                document.querySelectorAll('#ready-orders-list .btn-gold').forEach(btn => {
                    const orderId = parseInt(btn.getAttribute('data-order-id'));
                    btn.onclick = () => openPayment(orderId);
                });
            } catch(e) { console.error(e); }
        }

        async function openOrderModal(tableId, tableNumber, tableSeats) {
            currentTableId = tableId;
            currentTableSeats = tableSeats || 8;
            currentCart = [];
            try {
                const [dishResp, catResp] = await Promise.all([
                    fetch('/api/dishes/'),
                    fetch('/api/categories/')
                ]);
                const dishData = await dishResp.json();
                const catData  = await catResp.json();
                if (!dishData.success) throw new Error('Ошибка загрузки меню');
                const dishes = dishData.data;
                const cats   = catData.success ? catData.data : [];
                let menuHtml = '';
                for (let cat of cats) {
                    const catDishes = dishes.filter(d => d.category_id === cat.id);
                    if (!catDishes.length) continue;
                    menuHtml += `<div class="mb-3">
                        <h6 class="text-warning border-bottom border-warning pb-1 mb-2" style="font-size:1rem;">${cat.name}</h6>
                        <div class="row g-2">`;
                    catDishes.forEach(d => {
                        menuHtml += `
                            <div class="col-6">
                                <div class="dish-item" data-id="${d.id}" data-name="${d.name}" data-price="${d.price}">
                                    <div class="fw-semibold" style="font-size:13px;">${d.name}</div>
                                    <div class="text-warning small" style="font-size:11px;">${d.price} ₽</div>
                                </div>
                            </div>
                        `;
                    });
                    menuHtml += `</div></div>`;
                }
                const modalHtml = `
                    <div class="modal fade" id="orderModal" tabindex="-1">
                        <div class="modal-dialog modal-xl">
                            <div class="modal-content">
                                <div class="modal-header py-2">
                                    <h5 class="modal-title text-warning"><i class="fas fa-utensils me-2"></i>Заказ для стола ${tableNumber}</h5>
                                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body" style="padding: 16px;">
                                    <div class="row g-3">
                                        <div class="col-md-7">
                                            <h6 class="text-warning mb-2">📋 Меню</h6>
                                            <div style="max-height: 460px; overflow-y: auto; padding-right: 6px;">${menuHtml}</div>
                                        </div>
                                        <div class="col-md-5">
                                            <h6 class="text-warning mb-2">🛒 Корзина</h6>
                                            <div id="cart-items" style="min-height: 100px; max-height: 280px; overflow-y: auto;"></div>
                                            <div class="border-top border-warning mt-2 pt-2">
                                                <div class="d-flex justify-content-between fw-bold">
                                                    <span>Итого:</span>
                                                    <span id="cart-total" class="text-warning">0 ₽</span>
                                                </div>
                                            </div>
                                            <label class="mt-2 small">Количество гостей (макс. ${tableSeats})</label>
                                            <input type="number" id="guest-count" class="form-control my-1 py-1" value="2" min="1" max="${tableSeats}" oninput="if(this.value > ${tableSeats}) this.value = ${tableSeats}; if(this.value < 1) this.value = 1;">
                                            <button onclick="submitOrder()" class="btn btn-gold w-100 mt-2 py-1">Оформить заказ</button>
                                            <button class="btn btn-outline-light w-100 mt-1 py-1" data-bs-dismiss="modal">Отмена</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                const container = document.getElementById('order-modal-container');
                container.innerHTML = modalHtml;
                updateCart();
                const modalEl = document.getElementById('orderModal');
                const modal = new bootstrap.Modal(modalEl);
                modalEl.addEventListener('click', e => {
                    const dishDiv = e.target.closest('.dish-item');
                    if (dishDiv) {
                        addToCart(parseInt(dishDiv.dataset.id), dishDiv.dataset.name, parseFloat(dishDiv.dataset.price));
                    }
                });
                modalEl.addEventListener('hidden.bs.modal', () => container.innerHTML = '');
                modal.show();
            } catch(err) {
                alert('Ошибка: ' + err.message);
            }
        }

        function addToCart(id, name, price) {
            const existing = currentCart.find(i => i.id === id);
            if (existing) existing.qty++;
            else currentCart.push({ id, name, price, qty: 1 });
            updateCart();
        }
        function removeFromCart(id) {
            currentCart = currentCart.filter(i => i.id !== id);
            updateCart();
        }
        function updateCart() {
            const container = document.getElementById('cart-items');
            const totalEl = document.getElementById('cart-total');
            if (!container) return;
            if (!currentCart.length) {
                container.innerHTML = '<p class="text-center text-white-50 py-3">Корзина пуста</p>';
                if (totalEl) totalEl.innerText = '0 ₽';
                return;
            }
            let total = 0;
            container.innerHTML = currentCart.map(item => {
                total += item.price * item.qty;
                return `
                    <div class="cart-item">
                        <div>
                            <div class="fw-semibold" style="font-size:13px;">${item.name}</div>
                            <div class="small text-warning" style="font-size:11px;">x${item.qty} × ${item.price} ₽</div>
                        </div>
                        <button class="btn btn-sm btn-outline-danger" style="padding:2px 8px; font-size:12px;" onclick="removeFromCart(${item.id})">✕</button>
                    </div>
                `;
            }).join('');
            if (totalEl) totalEl.innerText = total + ' ₽';
        }

        async function submitOrder() {
            if (!currentCart.length) { alert('Добавьте блюда в корзину'); return; }
            let guestCount = parseInt(document.getElementById('guest-count')?.value) || 1;
            const maxGuests = currentTableSeats;
            if (guestCount > maxGuests) guestCount = maxGuests;
            if (guestCount < 1) guestCount = 1;
            const pad = n => String(n).padStart(2,'0');
            const now = new Date();
            const localTime = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
            const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));
            try {
                const resp = await fetch('/api/orders/create/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table_id: currentTableId, items, guest_count: guestCount, client_time: localTime })
                });
                const data = await resp.json();
                if (data.success) {
                    const modal = bootstrap.Modal.getInstance(document.getElementById('orderModal'));
                    if (modal) modal.hide();
                    await loadTables();
                    alert(`Заказ #${data.order_id} оформлен! Сумма: ${data.total} ₽`);
                } else {
                    alert('Ошибка: ' + (data.error || 'неизвестная ошибка'));
                }
            } catch(e) { alert('Ошибка сети: ' + e.message); }
        }

        function openPayment(orderId) {
            currentOrderId = orderId;
            const payEl = document.getElementById('paymentModal');
            // Уничтожаем старый инстанс если есть
            const existing = bootstrap.Modal.getInstance(payEl);
            if (existing) existing.dispose();
            const modal = new bootstrap.Modal(payEl);
            modal.show();
            // Вешаем обработчик на кнопку
            const confirmBtn = document.getElementById('confirm-pay-btn');
            const newBtn = confirmBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newBtn, confirmBtn);
            newBtn.id = 'confirm-pay-btn';
            newBtn.onclick = function() { confirmPayment(orderId); };
        }

        async function confirmPayment(orderId) {
            const methodEl = document.getElementById('payment-method');
            const method = methodEl ? methodEl.value : 'cash';
            const btn = document.getElementById('confirm-pay-btn');
            if (btn) { btn.disabled = true; btn.textContent = 'Обработка...'; }
            try {
                const resp = await fetch('/api/pay-fixed/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ order_id: orderId, payment_method: method })
                });
                const data = await resp.json();
                if (data.success) {
                    const payModal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
                    if (payModal) payModal.hide();
                    await showReceipt(orderId, method);
                    await loadActiveOrders();
                    await loadTables();
                } else {
                    alert('Ошибка оплаты: ' + (data.error || 'неизвестная ошибка'));
                    if (btn) { btn.disabled = false; btn.textContent = 'Подтвердить оплату'; }
                }
            } catch(e) {
                alert('Ошибка соединения: ' + e.message);
                if (btn) { btn.disabled = false; btn.textContent = 'Подтвердить оплату'; }
            }
        }

        async function showReceipt(orderId, forcedMethod) {
            try {
                const resp = await fetch(`/api/orders/receipt/${orderId}/`);
                const data = await resp.json();
                if (!data.success) throw new Error(data.error);
                const labels = { cash: 'Наличные', card: 'Карта', qr: 'QR-код' };
                const payment = forcedMethod ? (labels[forcedMethod] || forcedMethod) : data.data.payment_method;
                const order = data.data;
                const itemsHtml = order.items.map(i => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:4px; font-size:12px;">
                        <span>${i.name} x${i.quantity}</span><span>${i.total} ₽</span>
                    </div>
                `).join('');
                document.getElementById('receipt-content').innerHTML = `
                    <div style="text-align:center; margin-bottom:12px;">
                        <div style="font-size:18px; font-weight:700;">АИС «Общепит»</div>
                        <div style="font-size:10px;">Чек № ${order.order_id}</div>
                    </div>
                    <div style="margin-bottom:8px; font-size:11px;">Стол ${order.table_number} | ${order.created_at}</div>
                    <div style="border-top:1px dashed #ccc; border-bottom:1px dashed #ccc; padding:6px 0; margin-bottom:8px;">${itemsHtml}</div>
                    <div style="display:flex; justify-content:space-between; font-weight:700; font-size:16px; margin-bottom:6px;">
                        <span>ИТОГО:</span><span>${order.total} ₽</span>
                    </div>
                    <div style="font-size:11px;">Оплата: ${payment}</div>
                    <div style="text-align:center; margin-top:12px; font-size:10px;">Спасибо за визит!</div>
                `;
                new bootstrap.Modal(document.getElementById('receiptModal')).show();
            } catch(e) {
                console.error('Ошибка получения чека:', e);
                alert('Не удалось загрузить чек, но оплата прошла.');
            }
        }

        function addHours(timeStr, hours) {
            if (!timeStr) return '';
            let parts = timeStr.split(':');
            if (parts.length < 2) return timeStr;
            let h = (parseInt(parts[0]) + hours) % 24;
            return String(h).padStart(2,'0') + ':' + parts[1];
        }

        loadTables();
        setInterval(loadTables, 30000);
    </script>
</body>
</html>
