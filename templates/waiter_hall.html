<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зал ресторана - Официант</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0a0f2a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .hall-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin: 20px 0;
        }
        .table-card {
            background: rgba(15,20,45,0.8);
            border: 1px solid #ffd700;
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .table-card:hover { transform: scale(1.02); background: #1a1f4a; }
        .table-number { font-size: 22px; font-weight: bold; color: #ffd700; }
        .table-seats { font-size: 14px; }
        .status { font-size: 13px; padding: 4px 12px; border-radius: 20px; display: inline-block; margin-top: 8px; }
        .status-free { background: #2e7d32; }
        .status-occupied { background: #c62828; }
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        .order-card {
            background: rgba(10,12,32,0.9);
            border: 1px solid #ffd700;
            border-radius: 16px;
            padding: 15px;
        }
        .btn-gold {
            background: #ffd700;
            color: #000;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            padding: 8px 20px;
            width: 100%;
            margin-top: 10px;
        }
        .dish-item {
            background: rgba(30,35,70,0.8);
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 6px;
            cursor: pointer;
        }
        .cart-item {
            background: #1e2a3a;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        @media (max-width: 900px) { .hall-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 500px) { .hall-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">
    <div class="d-flex justify-content-between align-items-center">
        <h2><i class="fas fa-utensils"></i> Зал ресторана</h2>
        <button class="btn-gold" onclick="loadTables()" style="width: auto;">Обновить</button>
    </div>

    <div id="hall-container" class="hall-grid">Загрузка столов...</div>

    <div class="mt-4">
        <h5>Блюда готовы / ожидают оплаты</h5>
        <div id="ready-orders-list" class="orders-grid">Нет заказов</div>
    </div>

    <div id="order-modal-container"></div>

    <!-- Модалка оплаты -->
    <div class="modal fade" id="paymentModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header">
                    <h5 class="modal-title text-warning">Оплата заказа</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <select id="payment-method" class="form-select mb-3">
                        <option value="cash">Наличные</option>
                        <option value="card">Карта</option>
                        <option value="qr">QR-код</option>
                    </select>
                    <button id="confirm-pay-btn" class="btn-gold">Подтвердить оплату</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модалка чека -->
    <div class="modal fade" id="receiptModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content bg-white text-black">
                <div class="modal-body" id="receipt-content"></div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                    <button class="btn btn-warning" onclick="window.print()">Печать</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let currentTableId = null;
    let currentTableSeats = 8;
    let currentCart = [];

    // Полностью рабочие функции (упрощённые)
    async function loadTables() {
        try {
            const res = await fetch('/api/tables/');
            const data = await res.json();
            if (!data.success) throw new Error(data.error);
            const container = document.getElementById('hall-container');
            container.innerHTML = data.data.map(t => {
                const free = t.status === 'free';
                return `
                    <div class="table-card" data-id="${t.id}" data-free="${free}" data-number="${t.number}" data-seats="${t.seats}">
                        <div class="table-number">Стол ${t.number}</div>
                        <div class="table-seats">${t.seats} мест</div>
                        <div class="status ${free ? 'status-free' : 'status-occupied'}">${free ? 'Свободен' : 'Занят'}</div>
                    </div>
                `;
            }).join('');
            document.querySelectorAll('.table-card').forEach(card => {
                if (card.dataset.free === 'true') {
                    card.onclick = () => openOrderModal(parseInt(card.dataset.id), parseInt(card.dataset.number), parseInt(card.dataset.seats));
                }
            });
            await loadActiveOrders();
        } catch(e) { document.getElementById('hall-container').innerHTML = `<div class="text-danger">Ошибка: ${e.message}</div>`; }
    }

    async function loadActiveOrders() {
        try {
            const res = await fetch('/api/orders/active/');
            const data = await res.json();
            const container = document.getElementById('ready-orders-list');
            if (!data.success || !data.data.length) { container.innerHTML = '<p>Нет заказов</p>'; return; }
            const ready = data.data.filter(o => o.status === 'ready');
            if (!ready.length) { container.innerHTML = '<p>Нет готовых заказов</p>'; return; }
            container.innerHTML = ready.map(o => {
                const items = (o.items || []).map(i => `${i.dish_name} x${i.quantity}`).join(', ');
                const time = new Date(o.created_at).toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
                return `
                    <div class="order-card">
                        <div><strong>Стол ${o.table_number}</strong> <span class="badge bg-success">Готов</span></div>
                        <div class="small">${time}</div>
                        <div class="small">${items}</div>
                        <button class="btn-gold" data-id="${o.id}">Принять оплату</button>
                    </div>
                `;
            }).join('');
            document.querySelectorAll('.order-card .btn-gold').forEach(btn => {
                btn.onclick = () => openPayment(parseInt(btn.dataset.id));
            });
        } catch(e) { console.error(e); }
    }

    async function openOrderModal(tableId, number, seats) {
        currentTableId = tableId;
        currentTableSeats = seats;
        currentCart = [];
        try {
            const [dRes, cRes] = await Promise.all([fetch('/api/dishes/'), fetch('/api/categories/')]);
            const dishes = await dRes.json();
            const cats = await cRes.json();
            if (!dishes.success) throw new Error('Нет меню');
            let menuHtml = '';
            for (let cat of cats.data) {
                const catDishes = dishes.data.filter(d => d.category_id === cat.id);
                if (!catDishes.length) continue;
                menuHtml += `<h6 class="text-warning mt-2">${cat.name}</h6><div class="row g-2">`;
                catDishes.forEach(d => {
                    menuHtml += `
                        <div class="col-6">
                            <div class="dish-item" data-id="${d.id}" data-name="${d.name}" data-price="${d.price}">
                                <strong>${d.name}</strong><br>${d.price} ₽
                            </div>
                        </div>
                    `;
                });
                menuHtml += `</div>`;
            }
            const modalHtml = `
                <div class="modal fade" id="orderModal" tabindex="-1">
                    <div class="modal-dialog modal-xl">
                        <div class="modal-content bg-dark text-white">
                            <div class="modal-header">
                                <h5 class="modal-title">Заказ стола ${number}</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body row">
                                <div class="col-md-7">
                                    <h6>Меню</h6>
                                    <div style="max-height:400px; overflow-y:auto;">${menuHtml}</div>
                                </div>
                                <div class="col-md-5">
                                    <h6>Корзина</h6>
                                    <div id="cart-items" style="min-height:100px;"></div>
                                    <div class="mt-2"><strong>Итого: <span id="cart-total">0</span> ₽</strong></div>
                                    <label class="mt-2">Гостей (макс. ${seats})</label>
                                    <input type="number" id="guest-count" class="form-control" value="2" min="1" max="${seats}" oninput="if(this.value>${seats}) this.value=${seats}">
                                    <button class="btn-gold mt-3" onclick="submitOrder()">Оформить заказ</button>
                                    <button class="btn btn-secondary mt-2" data-bs-dismiss="modal">Отмена</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('order-modal-container').innerHTML = modalHtml;
            updateCart();
            const modalEl = document.getElementById('orderModal');
            const modal = new bootstrap.Modal(modalEl);
            modalEl.addEventListener('click', e => {
                const dish = e.target.closest('.dish-item');
                if (dish) addToCart(parseInt(dish.dataset.id), dish.dataset.name, parseFloat(dish.dataset.price));
            });
            modalEl.addEventListener('hidden.bs.modal', () => document.getElementById('order-modal-container').innerHTML = '');
            modal.show();
        } catch(e) { alert('Ошибка: '+e.message); }
    }

    function addToCart(id, name, price) {
        const existing = currentCart.find(i => i.id === id);
        if (existing) existing.qty++;
        else currentCart.push({ id, name, price, qty: 1 });
        updateCart();
    }
    function removeFromCart(id) {
        const item = currentCart.find(i => i.id === id);
        if (item.qty > 1) item.qty--;
        else currentCart = currentCart.filter(i => i.id !== id);
        updateCart();
    }
    function updateCart() {
        const container = document.getElementById('cart-items');
        const totalSpan = document.getElementById('cart-total');
        if (!container) return;
        if (!currentCart.length) {
            container.innerHTML = '<p>Корзина пуста</p>';
            totalSpan.innerText = '0';
            return;
        }
        let total = 0;
        container.innerHTML = currentCart.map(item => {
            total += item.price * item.qty;
            return `
                <div class="cart-item">
                    <div><strong>${item.name}</strong><br>${item.qty} x ${item.price}₽</div>
                    <button class="btn btn-sm btn-danger" onclick="removeFromCart(${item.id})">✕</button>
                </div>
            `;
        }).join('');
        totalSpan.innerText = total;
    }

    async function submitOrder() {
        if (!currentCart.length) { alert('Добавьте блюда'); return; }
        let guests = parseInt(document.getElementById('guest-count').value) || 1;
        if (guests > currentTableSeats) guests = currentTableSeats;
        const localTime = new Date().toISOString().slice(0,19);
        const items = currentCart.map(i => ({ dish_id: i.id, quantity: i.qty }));
        try {
            const res = await fetch('/api/orders/create/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ table_id: currentTableId, items, guest_count: guests, client_time: localTime })
            });
            const data = await res.json();
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('orderModal')).hide();
                await loadTables();
                alert(`Заказ #${data.order_id} на сумму ${data.total}₽`);
            } else alert('Ошибка: '+data.error);
        } catch(e) { alert('Ошибка сети'); }
    }

    function openPayment(orderId) {
        const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
        modal.show();
        const oldBtn = document.getElementById('confirm-pay-btn');
        const newBtn = oldBtn.cloneNode(true);
        oldBtn.parentNode.replaceChild(newBtn, oldBtn);
        newBtn.id = 'confirm-pay-btn';
        newBtn.onclick = () => confirmPayment(orderId);
    }

    async function confirmPayment(orderId) {
        const method = document.getElementById('payment-method').value;
        try {
            const res = await fetch('/api/pay-fixed/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ order_id: orderId, payment_method: method })
            });
            const data = await res.json();
            if (data.success) {
                bootstrap.Modal.getInstance(document.getElementById('paymentModal')).hide();
                await showReceipt(orderId, method);
                await loadTables();
                alert('Оплата прошла успешно');
            } else {
                alert('Ошибка оплаты: ' + data.error);
            }
        } catch(e) { alert('Ошибка соединения: ' + e.message); }
    }

    async function showReceipt(orderId, method) {
        try {
            const res = await fetch(`/api/orders/receipt/${orderId}/`);
            const data = await res.json();
            if (!data.success) throw new Error();
            const order = data.data;
            const itemsHtml = order.items.map(i => `<div>${i.name} x${i.quantity} = ${i.total}₽</div>`).join('');
            document.getElementById('receipt-content').innerHTML = `
                <div style="text-align:center"><h4>АИС Общепит</h4><small>Чек №${order.order_id}</small></div>
                <hr>${itemsHtml}<hr>
                <div><strong>ИТОГО: ${order.total}₽</strong></div>
                <div>Оплата: ${method === 'cash' ? 'Наличные' : method === 'card' ? 'Карта' : 'QR-код'}</div>
                <div style="text-align:center; margin-top:15px;">Спасибо за заказ!</div>
            `;
            new bootstrap.Modal(document.getElementById('receiptModal')).show();
        } catch(e) { alert('Не удалось загрузить чек'); }
    }

    loadTables();
    setInterval(loadTables, 30000);
</script>
</body>
</html>
