{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}

{% block extra_css %}
<style>
    .hall-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 16px;
    }
    .table-card {
        background: rgba(15, 20, 45, 0.65);
        backdrop-filter: blur(4px);
        border-radius: 20px;
        padding: 16px 12px;
        text-align: center;
        border: 1px solid rgba(255, 215, 0, 0.3);
        cursor: pointer;
        transition: 0.25s;
    }
    .table-card:hover {
        transform: translateY(-4px);
        border-color: #ffd700;
        box-shadow: 0 0 15px rgba(255,215,0,0.3);
        background: rgba(20,28,55,0.8);
    }
    .table-icon { font-size: 28px; color: #ffd700; }
    .table-number { font-size: 20px; font-weight: 700; color: white; }
    .table-seats { font-size: 12px; color: rgba(255,255,255,0.6); }
    .table-status {
        font-size: 11px;
        padding: 3px 12px;
        border-radius: 40px;
        background: rgba(0,0,0,0.5);
        border: 1px solid;
        width: fit-content;
        margin-top: 6px;
    }
    .orders-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 12px;
        margin-top: 8px;
    }
    .order-card {
        background: rgba(10, 12, 32, 0.7);
        backdrop-filter: blur(4px);
        border-radius: 16px;
        padding: 12px;
        border: 1px solid rgba(255,215,0,0.25);
    }
    .btn-gold {
        background: #ffd700;
        color: #0a0f2a;
        font-weight: 700;
        border: none;
        border-radius: 40px;
        padding: 6px 12px;
        font-size: 12px;
        cursor: pointer;
    }
    @media (max-width: 900px) {
        .hall-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 500px) {
        .hall-grid { grid-template-columns: 1fr; }
    }
</style>
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2 style="color:#ffd700; font-size: 1.8rem;">Зал ресторана</h2>
    <button class="btn-gold" onclick="loadTables()">Обновить</button>
</div>

<div id="hall-container" class="hall-grid">Загрузка столов...</div>

<div class="mt-4">
    <h5 style="color:#ffd700;">Готовые к оплате</h5>
    <div id="ready-orders-list" class="orders-grid">Нет заказов</div>
</div>

<!-- Модалка оплаты -->
<div class="modal fade" id="paymentModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title text-warning">Оплата заказа</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <select id="payment-method" class="form-select mb-3">
                    <option value="cash">Наличные</option>
                    <option value="card">Карта</option>
                    <option value="qr">QR-код</option>
                </select>
                <button id="confirm-pay-btn" class="btn-gold w-100">Подтвердить оплату</button>
            </div>
        </div>
    </div>
</div>

<!-- Модалка чека -->
<div class="modal fade" id="receiptModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:white; color:#0a0f2a; border-radius: 16px;">
            <div class="modal-body" id="receipt-content" style="padding:20px;"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Закрыть</button>
                <button class="btn btn-warning" onclick="window.print()">Печать</button>
            </div>
        </div>
    </div>
</div>

<script>
let currentOrderId = null;

async function loadTables() {
    try {
        const resp = await fetch('/api/tables/');
        const data = await resp.json();
        if (!data.success) throw new Error(data.error);
        const container = document.getElementById('hall-container');
        if (!data.data.length) {
            container.innerHTML = '<div class="text-center">Нет столов</div>';
            return;
        }
        container.innerHTML = data.data.map(t => {
            const free = t.status === 'free';
            const statusColor = free ? '#5de8a0' : '#f87171';
            return `
                <div class="table-card" onclick="${free ? `openOrderModal(${t.id}, ${t.number}, ${t.seats})` : ''}" style="opacity:${free?1:0.6}; cursor:${free?'pointer':'not-allowed'}">
                    <div class="table-icon">🍽️</div>
                    <div class="table-number">Стол ${t.number}</div>
                    <div class="table-seats">${t.seats} мест</div>
                    <div class="table-status" style="border-color:${statusColor}; color:${statusColor}">${free?'Свободен':'Занят'}</div>
                </div>
            `;
        }).join('');
        await loadReadyOrders();
    } catch(e) {
        document.getElementById('hall-container').innerHTML = `<div class="text-danger">Ошибка: ${e.message}</div>`;
    }
}

async function loadReadyOrders() {
    try {
        const resp = await fetch('/api/orders/active/');
        const data = await resp.json();
        const container = document.getElementById('ready-orders-list');
        if (!data.success || !data.data.length) {
            container.innerHTML = '<p>Нет готовых заказов</p>';
            return;
        }
        const ready = data.data.filter(o => o.status === 'ready');
        if (!ready.length) {
            container.innerHTML = '<p>Нет заказов для оплаты</p>';
            return;
        }
        container.innerHTML = ready.map(o => `
            <div class="order-card">
                <div class="fw-bold text-warning">Стол ${o.table_number}</div>
                <div class="small">${o.created_at}</div>
                <div class="small mb-2">${(o.items||[]).map(i=>i.dish_name+' x'+i.quantity).join(', ')}</div>
                <button class="btn-gold w-100" onclick="openPayment(${o.id})">Принять оплату</button>
            </div>
        `).join('');
    } catch(e) { console.error(e); }
}

function openPayment(orderId) {
    currentOrderId = orderId;
    const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
    modal.show();
    document.getElementById('confirm-pay-btn').onclick = () => payOrder(orderId);
}

async function payOrder(orderId) {
    const method = document.getElementById('payment-method').value;
    console.log(`Оплата заказа ${orderId} методом ${method}`);
    try {
        const resp = await fetch('/api/orders/pay/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({order_id: orderId, payment_method: method})
        });
        const data = await resp.json();
        console.log('Ответ:', data);
        if (data.success) {
            bootstrap.Modal.getInstance(document.getElementById('paymentModal'))?.hide();
            await showReceipt(orderId, method);
            await loadTables();
            alert('Оплата прошла успешно!');
        } else {
            alert('Ошибка: ' + data.error);
        }
    } catch(e) {
        console.error(e);
        alert('Ошибка сети: ' + e.message);
    }
}

async function showReceipt(orderId) {
    const resp = await fetch(`/api/orders/receipt/${orderId}/`);
    const data = await resp.json();
    if (!data.success) return;
    const order = data.data;
    const itemsHtml = order.items.map(i => `<div>${i.name} x${i.quantity} = ${i.total} ₽</div>`).join('');
    document.getElementById('receipt-content').innerHTML = `
        <div style="text-align:center;"><h4>АИС Общепит</h4><small>Чек №${order.order_id}</small></div>
        <hr>${itemsHtml}<hr>
        <div><strong>ИТОГО: ${order.total} ₽</strong></div>
        <div>Оплата: ${order.payment_method}</div>
        <div class="text-center mt-3">Спасибо за заказ!</div>
    `;
    new bootstrap.Modal(document.getElementById('receiptModal')).show();
}

function openOrderModal(tableId, tableNumber, seats) {
    alert(`Функция создания заказа. Стол ${tableNumber}, мест ${seats}. Реализуйте при необходимости.`);
}

loadTables();
setInterval(loadTables, 30000);
</script>
{% endblock %}
