{% extends 'base.html' %}
{% block title %}Зал ресторана - Официант{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
<h4 class="mb-0">Зал ресторана</h4>
            <button class="btn btn-warning btn-sm" id="refresh-tables">Обновить</button>
        </div>
    </div>
    <div class="card-body">
        <div id="hall-container" class="row">
            <div class="text-center py-5">
                <div class="spinner-border text-light" role="status"></div>
                <p class="mt-2">Загрузка столов...</p>
            </div>
        </div>
        <div id="ready-orders-container" class="mt-4">
            <h5 style="color: #ffd700;">Готовые заказы</h5>
            <div id="ready-orders-list" class="row"></div>
        </div>
    </div>
</div>

<script>
    function addHours(timeStr, hours) {
        if (!timeStr || !timeStr.includes(':')) return timeStr;
        const [h, m] = timeStr.split(':').map(Number);
        const newH = (h + hours) % 24;
        return String(newH).padStart(2,'0') + ':' + String(m).padStart(2,'0');
    }

    let currentTableId = null;
    let currentCart = [];
    let ordersRefreshInterval = null;

    async function loadTables() {
        try {
            const response = await fetch('/api/tables/');
            const data = await response.json();
            if (data.success && data.data) {
                let html = '<div class="row">';
                for (const table of data.data) {
                    let bgColor = '', statusText = '', clickable = table.status === 'free';
                    if (table.status === 'free') {
                        bgColor = 'rgba(40,90,40,0.7)';
                        statusText = 'Свободен';
                    } else if (table.status === 'occupied') {
                        bgColor = 'rgba(140,40,40,0.7)';
                        statusText = 'Занят';
                    } else {
                        bgColor = 'rgba(140,100,30,0.7)';
                        statusText = 'Забронирован';
                    }
                    html += `
                        <div class="col-6 col-md-3 mb-3">
                            <div class="table-card-box text-center"
                                 style="
                                    background: ${bgColor};
                                    border-radius: 16px;
                                    border: 2px solid ${table.status === 'free' ? 'rgba(40,200,80,0.5)' : (table.status === 'occupied' ? 'rgba(220,60,60,0.5)' : 'rgba(220,160,30,0.5)')};
                                    padding: 18px 10px;
                                    cursor: ${clickable ? 'pointer' : 'not-allowed'};
                                    opacity: ${clickable ? '1' : '0.65'};
                                    transition: transform 0.15s ease, box-shadow 0.15s ease;
                                    min-height: 140px;
                                    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;
                                 "
                                 data-table-id="${table.id}"
                                 data-table-number="${table.number}"
                                 data-table-seats="${table.seats}"
                                 data-table-status="${table.status}"
                                 onmouseover="${clickable ? 'this.style.transform=\'translateY(-3px)\';this.style.boxShadow=\'0 8px 24px rgba(0,0,0,0.4)\'':''}"
                                 onmouseout="${clickable ? 'this.style.transform=\'\';this.style.boxShadow=\'\'' : ''}">
                                <i class="fas fa-utensils fa-lg" style="color: #ffd700;"></i>
                                <div style="color:white; font-size:18px; font-weight:700; line-height:1;">Стол ${table.number}</div>
                                <div style="color:rgba(255,255,255,0.75); font-size:13px;">${table.seats} мест</div>
                                <div style="
                                    background: ${table.status === 'free' ? 'rgba(40,180,80,0.35)' : (table.status === 'occupied' ? 'rgba(210,50,50,0.35)' : 'rgba(200,140,20,0.35)')};
                                    color: white;
                                    font-size: 13px;
                                    font-weight: 600;
                                    padding: 3px 12px;
                                    border-radius: 20px;
                                    white-space: nowrap;
                                    border: 1px solid ${table.status === 'free' ? 'rgba(40,200,80,0.6)' : (table.status === 'occupied' ? 'rgba(220,60,60,0.6)' : 'rgba(220,160,30,0.6)')};
                                ">${statusText}</div>
                            </div>
                        </div>
                    `;
                }
                html += '</div>';
                document.getElementById('hall-container').innerHTML = html;
                document.querySelectorAll('.table-card-box').forEach(card => {
                    const status = card.getAttribute('data-table-status');
                    if (status === 'free') {
                        card.addEventListener('click', (e) => {
                            const tableId = parseInt(card.getAttribute('data-table-id'));
                            const tableNumber = parseInt(card.getAttribute('data-table-number'));
                            const tableSeats = parseInt(card.getAttribute('data-table-seats')) || 8;
                            openOrderModal(tableId, tableNumber, tableSeats);
                        });
                    }
                });
            }
            await loadReadyOrders();
        } catch (error) {
            document.getElementById('hall-container').innerHTML = '<p class="text-center text-danger">Ошибка загрузки столов</p>';
        }
    }

    
    const statusMap = {
        'new':     { label: 'Новый',      color: '#6ab0ff', bg: 'rgba(50,130,250,0.2)' },
        'cooking': { label: 'Готовится',  color: '#fbb060', bg: 'rgba(250,150,30,0.2)' },
        'ready':   { label: 'Готов',      color: '#5de8a0', bg: 'rgba(40,180,100,0.2)' },
        'served':  { label: 'Подано',     color: '#c084fc', bg: 'rgba(150,80,250,0.2)' },
        'paid':    { label: 'Оплачен',    color: '#ffd700', bg: 'rgba(255,215,0,0.2)'  },
    };

    async function loadReadyOrders() {
        try {
            const response = await fetch('/api/orders/active/');
            const data = await response.json();
            if (data.success && data.data) {
                const readyOrders = data.data.filter(order => order.status === 'ready' || order.status === 'cooking' || order.status === 'new');
                if (readyOrders.length === 0) {
                    document.getElementById('ready-orders-list').innerHTML = '<p class="text-center" style="color: white;">Нет готовых заказов</p>';
                    return;
                }
                let html = '';
                for (const order of readyOrders) {
                    const sm = statusMap[order.status] || { label: order.status, color: '#fff', bg: 'rgba(80,80,80,0.2)' };
                    const borderColor = order.status === 'ready' ? 'rgba(40,200,80,0.5)' : order.status === 'cooking' ? 'rgba(250,150,30,0.5)' : 'rgba(100,150,255,0.4)';
                    const items = (order.items || []).map(i => `<span style="color:rgba(255,255,255,0.75);font-size:12px;">${i.dish_name} ×${i.quantity}</span>`).join(', ') || '—';
                    html += `
                        <div class="col-md-4 mb-3">
                            <div class="ready-order-card" style="
                                background: rgba(20,20,60,0.75);
                                border: 2px solid ${borderColor};
                                border-radius: 16px;
                                padding: 16px;
                                cursor: pointer;
                                transition: transform 0.15s, box-shadow 0.15s;
                            " data-order-id="${order.id}" data-order-table="${order.table_number}"
                            onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 8px 24px rgba(0,0,0,0.4)'"
                            onmouseout="this.style.transform='';this.style.boxShadow=''">
                                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                                    <span style="color:#ffd700;font-weight:700;font-size:16px;">Стол ${order.table_number}</span>
                                    <span style="background:${sm.bg};color:${sm.color};border:1px solid ${sm.color};padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600;">${sm.label}</span>
                                </div>
                                <div style="color:rgba(255,255,255,0.6);font-size:12px;margin-bottom:8px;">
                                    <i class="fas fa-clock me-1"></i>${addHours(order.created_at, 2)}
                                </div>
                                <div style="color:rgba(255,255,255,0.7);font-size:12px;margin-bottom:12px;line-height:1.5;">${items}</div>
                                <button style="width:100%;background:#ffd700;color:#1a1a4a;border:none;border-radius:10px;padding:7px;font-weight:700;font-size:13px;cursor:pointer;">
                                    ${order.status === 'ready' ? '<i class=\"fas fa-cash-register me-1\"></i>Принять оплату' : '<i class=\"fas fa-eye me-1\"></i>Просмотреть'}
                                </button>
                            </div>
                        </div>
                    \`;
                }
                document.getElementById('ready-orders-list').innerHTML = html;
                document.querySelectorAll('.ready-order-card').forEach(card => {
                    card.addEventListener('click', (e) => {
                        const orderId = parseInt(card.getAttribute('data-order-id'));
                        showPaymentModal(orderId);
                    });
                });
            }
        } catch (error) {
            console.error('Error loading ready orders:', error);
        }
    }

    async function showPaymentModal(orderId) {
        const receiptResponse = await fetch(`/api/orders/receipt/${orderId}/`);
        const receiptData = await receiptResponse.json();
        if (receiptData.success) {
            const order = receiptData.data;
            const modalHtml = `
                <div class="modal fade" id="paymentModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title" style="color: #ffd700;">Оплата заказа</h5>
                                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <p><strong>Заказ #${order.order_id}</strong></p>
                                <p><strong>Стол ${order.table_number}</strong></p>
                                <p><strong>Сумма: ${order.total} ₽</strong></p>
                                <div class="mb-3">
                                    <label class="form-label" style="color: white;">Способ оплаты</label>
                                    <select id="payment-method" class="form-control">
                                        <option value="cash">Наличные</option>
                                        <option value="card">Карта</option>
                                        <option value="qr">QR-код</option>
                                    </select>
                                </div>
                                <button class="btn btn-warning w-100" id="confirm-payment-btn">Оплатить</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            const oldModal = document.getElementById('paymentModal');
            if (oldModal) oldModal.remove();
            document.body.insertAdjacentHTML('beforeend', modalHtml);
            document.getElementById('confirm-payment-btn').addEventListener('click', () => confirmPayment(orderId));
            const modal = new bootstrap.Modal(document.getElementById('paymentModal'));
            modal.show();
            modal._element.addEventListener('hidden.bs.modal', () => {
                loadReadyOrders(); // обновляем список готовых заказов после закрытия без оплаты
            });
        }
    }

    async function confirmPayment(orderId) {
        const paymentMethod = document.getElementById('payment-method').value;
        const response = await fetch('/api/orders/pay/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({order_id: orderId, payment_method: paymentMethod})
        });
        const data = await response.json();
        if (data.success) {
            const modal = bootstrap.Modal.getInstance(document.getElementById('paymentModal'));
            if (modal) modal.hide();
            await showReceipt(orderId, paymentMethod);
            await loadTables();
            await loadReadyOrders();
        } else {
            alert('Ошибка оплаты');
        }
    }

    async function showReceipt(orderId, forcedPaymentMethod) {
        const response = await fetch(`/api/orders/receipt/${orderId}/`);
        const data = await response.json();
        if (data.success) {
            const order = data.data;
            // Если передан метод оплаты напрямую — используем его (чтобы избежать гонки с API)
            const paymentLabels = { cash: 'Наличные', card: 'Карта', qr: 'QR-код' };
            const displayPayment = forcedPaymentMethod
                ? (paymentLabels[forcedPaymentMethod] || forcedPaymentMethod)
                : order.payment_method;
            let itemsHtml = '';
            for (const item of order.items) {
                itemsHtml += `<div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>${item.name} x${item.quantity}</span>
                    <span>${item.total} ₽</span>
                </div>`;
            }
            const receiptHtml = `
                <div class="modal fade" id="receiptModal" tabindex="-1" data-bs-backdrop="static">
                    <div class="modal-dialog modal-sm">
                        <div class="modal-content" style="background: white; color: black; font-family: monospace; width: 350px; margin: 0 auto;">
                            <div class="modal-body" id="receiptContent" style="text-align: center; padding: 20px;">
                                <h3>АИС "ОБЩЕПИТ"</h3>
                                <p>${addHours(order.created_at, 2)}</p>
                                <p>Стол ${order.table_number} | Заказ #${order.order_id}</p>
                                <hr>
                                <div style="text-align: left;">
                                    ${itemsHtml}
                                </div>
                                <hr>
                                <h4>ИТОГО: ${order.total} ₽</h4>
                                <p>Оплата: ${displayPayment}</p>
                                <hr>
                                <p>Спасибо за заказ!</p>
                                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px; flex-wrap: wrap;">
                                    <button class="btn btn-primary btn-sm" id="print-btn">Распечатать чек</button>
                                    <button class="btn btn-success btn-sm" id="pdf-btn">Скачать PDF</button>
                                    <button class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Закрыть</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            const oldReceipt = document.getElementById('receiptModal');
            if (oldReceipt) oldReceipt.remove();
            document.body.insertAdjacentHTML('beforeend', receiptHtml);
            document.getElementById('print-btn').addEventListener('click', () => {
                const printContent = document.getElementById('receiptContent').cloneNode(true);
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`<html><head><title>Чек АИС Общепит</title><style>body{font-family: monospace; text-align: center; padding: 20px;}</style></head><body>${printContent.innerHTML}</body></html>`);
                printWindow.document.close();
                printWindow.print();
            });
            document.getElementById('pdf-btn').addEventListener('click', () => {
                const printContent = document.getElementById('receiptContent').cloneNode(true);
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`<html><head><title>Чек АИС Общепит</title><style>body{font-family: monospace; text-align: center; padding: 20px;}</style></head><body>${printContent.innerHTML}</body></html>`);
                printWindow.document.close();
                printWindow.print();
            });
            const modal = new bootstrap.Modal(document.getElementById('receiptModal'));
            modal.show();
            modal._element.addEventListener('hidden.bs.modal', () => {
                loadTables();
                loadReadyOrders();
            });
        }
    }

    function openOrderModal(tableId, tableNumber, tableSeats) {
        tableSeats = tableSeats || 8;
        currentTableId = tableId;
        currentCart = [];
        const modalHtml = `
            <div class="modal fade" id="orderModal" tabindex="-1">
                <div class="modal-dialog modal-xl">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" style="color: #ffd700;">Заказ для стола ${tableNumber}</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="row">
                                <div class="col-md-7">
                                    <h5 style="color: #ffd700;">Меню</h5>
                                    <div id="menu-list" style="max-height: 400px; overflow-y: auto;"></div>
                                </div>
                                <div class="col-md-5">
                                    <div style="background: rgba(30,30,80,0.8); border-radius: 10px; padding: 15px;">
                                        <h5 style="color: #ffd700;">Корзина</h5>
                                        <div id="cart-items" style="color: white; min-height: 150px;">Корзина пуста</div>
                                        <hr>
                                        <div class="d-flex justify-content-between">
                                            <strong style="color: white;">Итого:</strong>
                                            <span id="total" style="color: #ffd700;">0 ₽</span>
                                        </div>
                                        <div class="mt-3">
                                            <label style="color: white;">Количество гостей</label>
                                            <input type="number" id="guest-count" class="form-control" value="2" min="1" max="${tableSeats}">
                                        <small style="color:rgba(255,215,0,0.7); font-size:11px;">Макс. ${tableSeats} гостей (вместимость стола)</small>
                                        </div>
                                        <div class="mt-3 d-grid gap-2">
                                            <button class="btn btn-warning" id="submit-order-btn">Оформить заказ</button>
                                            <button class="btn btn-secondary" data-bs-dismiss="modal">Отмена</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;
        const oldModal = document.getElementById('orderModal');
        if (oldModal) oldModal.remove();
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        loadMenuIntoModal();
        document.getElementById('submit-order-btn').addEventListener('click', () => submitOrder());
        const modal = new bootstrap.Modal(document.getElementById('orderModal'));
        modal.show();
    }

    async function loadMenuIntoModal() {
        try {
            const response = await fetch('/api/dishes/');
            const data = await response.json();
            if (data.success && data.data) {
                const categories = {};
                data.data.forEach(dish => {
                    if (!categories[dish.category]) categories[dish.category] = [];
                    categories[dish.category].push(dish);
                });
                let html = '';
                for (const [category, dishes] of Object.entries(categories)) {
                    html += `<h6 style="color: #ffd700; margin-top: 15px;">${category}</h6>`;
                    html += '<div class="row">';
                    dishes.forEach(dish => {
                        html += `
                            <div class="col-md-6 mb-2">
                                <div style="background: rgba(40,40,90,0.5); border-radius: 8px; padding: 8px;">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <div>
                                            <strong style="color: white;">${dish.name}</strong>
                                            <div style="color: #ffd700;">${dish.price} ₽</div>
                                        </div>
                                        <button class="btn btn-sm btn-success add-to-cart" data-id="${dish.id}" data-name="${dish.name}" data-price="${dish.price}">+</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    html += '</div>';
                }
                document.getElementById('menu-list').innerHTML = html;
                document.querySelectorAll('.add-to-cart').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = parseInt(btn.dataset.id);
                        const name = btn.dataset.name;
                        const price = parseInt(btn.dataset.price);
                        addToCart(id, name, price);
                        btn.innerHTML = '✓';
                        setTimeout(() => { btn.innerHTML = '+'; }, 500);
                    });
                });
            }
        } catch (error) {
            document.getElementById('menu-list').innerHTML = '<p class="text-center text-danger">Ошибка загрузки меню</p>';
        }
    }

    function addToCart(id, name, price) {
        const existing = currentCart.find(item => item.id === id);
        if (existing) existing.quantity++;
        else currentCart.push({id, name, price, quantity: 1});
        updateCartDisplay();
    }

    function updateCartDisplay() {
        let total = 0;
        let html = '';
        if (currentCart.length === 0) {
            html = '<p class="text-center" style="color: white;">Корзина пуста</p>';
        } else {
            currentCart.forEach((item, idx) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                html += `
                    <div class="d-flex justify-content-between mb-2" style="color: white; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px;">
                        <div>${item.name} x${item.quantity}</div>
                        <div>${itemTotal} ₽ <button class="btn btn-sm btn-danger remove-item" data-index="${idx}">Удалить</button></div>
                    </div>
                `;
            });
        }
        const cartDiv = document.getElementById('cart-items');
        const totalSpan = document.getElementById('total');
        if (cartDiv) cartDiv.innerHTML = html;
        if (totalSpan) totalSpan.innerHTML = total + ' ₽';
        document.querySelectorAll('.remove-item').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const idx = parseInt(btn.dataset.index);
                currentCart.splice(idx, 1);
                updateCartDisplay();
            });
        });
    }

    async function submitOrder() {
        if (currentCart.length === 0) {
            alert('Добавьте блюда в заказ');
            return;
        }
        const items = currentCart.map(item => ({dish_id: item.id, quantity: item.quantity}));
        const guestCount = document.getElementById('guest-count').value;
        const now = new Date();
        // Формируем локальное ISO-время с правильным смещением (не UTC)
        const pad = n => String(n).padStart(2, '0');
        const localTime = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}T${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        try {
            const response = await fetch('/api/orders/create/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    table_id: currentTableId,
                    items: items,
                    guest_count: guestCount,
                    client_time: localTime
                })
            });
            const data = await response.json();
            if (data.success) {
                alert(`Заказ номер ${data.order_id} создан! Сумма: ${data.total} ₽`);
                const modal = bootstrap.Modal.getInstance(document.getElementById('orderModal'));
                if (modal) modal.hide();
                loadTables();
                loadReadyOrders();
            } else {
                alert('Ошибка: ' + data.error);
            }
        } catch (error) {
            alert('Ошибка соединения');
        }
    }

    document.getElementById('refresh-tables').addEventListener('click', () => {
        loadTables();
        loadReadyOrders();
    });
    loadTables();
    if (ordersRefreshInterval) clearInterval(ordersRefreshInterval);
    ordersRefreshInterval = setInterval(() => {
        loadTables();
        loadReadyOrders();
    }, 10000);



</script>
{% endblock %}
