{% extends 'base.html' %}
{% block title %}Отчёты и аналитика{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="d-flex align-items-center mb-3 gap-3">
        <a href="/admin-panel/" class="btn btn-secondary" style="border-radius:20px;padding:6px 18px;font-size:14px;">
            <i class="fas fa-arrow-left me-1"></i> Назад
        </a>
        <h4 style="color:#ffd700;margin:0;">Отчёты и аналитика</h4>
    </div>
    <div class="card">
        <div class="card-header">
            <h4 class="mb-0">Панель управления</h4>
        </div>
        <div class="card-body">
            <!-- Фильтр периода -->
            <div class="row mb-3">
                <div class="col-md-3">
                    <label class="form-label">Период</label>
                    <select id="period-select" class="form-control">
                        <option value="day">Сегодня</option>
                        <option value="week" selected>Неделя</option>
                        <option value="month">Месяц</option>
                        <option value="custom">Свой период</option>
                    </select>
                </div>
                <div id="custom-date-range" style="display: none;" class="col-md-6">
                    <div class="row">
                        <div class="col-md-5">
                            <label class="form-label">С</label>
                            <input type="date" id="date-from" class="form-control">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">По</label>
                            <input type="date" id="date-to" class="form-control">
                        </div>
                    </div>
                </div>
                <div class="col-md-3 d-flex gap-2 align-items-end">
                    <button class="btn btn-primary btn-sm" onclick="loadReports()">Обновить</button>
                    <button class="btn btn-success btn-sm" onclick="exportData('orders')">
                        <i class="fas fa-file-excel me-1"></i>Экспорт заказов
                    </button>
                    <button class="btn btn-info btn-sm" onclick="exportData('popular')">
                        <i class="fas fa-file-excel me-1"></i>Экспорт блюд
                    </button>
                </div>
            </div>
            
            <!-- Карточки статистики -->
            <div class="row mb-3">
                <div class="col-md-4">
                    <div class="card text-center" style="background: rgba(26,26,74,0.9);">
                        <div class="card-body py-2">
                            <h6 style="color: rgba(255,255,255,0.7);">Выручка</h6>
                            <h3 id="total-revenue" style="color: #ffd700; margin: 0;">0 ₽</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center" style="background: rgba(42,90,42,0.9);">
                        <div class="card-body py-2">
                            <h6 style="color: rgba(255,255,255,0.7);">Заказов</h6>
                            <h3 id="total-orders" style="color: #ffd700; margin: 0;">0</h3>
                        </div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="card text-center" style="background: rgba(212,160,23,0.9);">
                        <div class="card-body py-2">
                            <h6 style="color: rgba(255,255,255,0.7);">Средний чек</h6>
                            <h3 id="avg-check" style="color: #ffd700; margin: 0;">0 ₽</h3>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Продажи по дням -->
            <div class="row mb-3">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header py-2">
                            <h6 class="mb-0">Продажи по дням</h6>
                        </div>
                        <div class="card-body py-2">
                            <div class="table-responsive">
                                <table class="table table-sm table-dark" style="font-size: 12px;">
                                    <thead id="table-dates">
                                        <tr><th>Дата</th></tr>
                                    </thead>
                                    <tbody>
                                        <tr id="table-revenue"><td><strong>Выручка</strong></td></tr>
                                        <tr id="table-orders"><td><strong>Заказы</strong></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Популярные блюда -->
            <div class="row">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header py-2">
                            <h6 class="mb-0">Популярные блюда за период</h6>
                        </div>
                        <div class="card-body py-2">
                            <div id="popular-dishes" class="text-center">Загрузка...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('period-select').addEventListener('change', function() {
        const customDiv = document.getElementById('custom-date-range');
        if (this.value === 'custom') {
            customDiv.style.display = 'flex';
            const today = new Date();
            const weekAgo = new Date();
            weekAgo.setDate(today.getDate() - 7);
            document.getElementById('date-from').value = weekAgo.toISOString().split('T')[0];
            document.getElementById('date-to').value = today.toISOString().split('T')[0];
        } else {
            customDiv.style.display = 'none';
        }
        loadReports();
    });
    
    async function loadReports() {
        let period = document.getElementById('period-select').value;
        let url = `/api/reports/?period=${period}`;
        
        if (period === 'custom') {
            const dateFrom = document.getElementById('date-from').value;
            const dateTo = document.getElementById('date-to').value;
            if (dateFrom && dateTo) {
                url = `/api/reports/?period=custom&date_from=${dateFrom}&date_to=${dateTo}`;
            }
        }
        
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            if (data.success) {
                document.getElementById('total-revenue').innerHTML = data.data.total_revenue.toFixed(2) + ' ₽';
                document.getElementById('total-orders').innerHTML = data.data.total_orders;
                document.getElementById('avg-check').innerHTML = data.data.avg_check.toFixed(2) + ' ₽';
                
                let datesHtml = '<tr><th>Дата</th>';
                let revenueHtml = '<tr><td><strong>Выручка</strong></td>';
                let ordersHtml = '<tr><td><strong>Заказы</strong></td>';
                
                for (let day of data.data.daily_data) {
                    datesHtml += `<th>${day.date}</th>`;
                    revenueHtml += `<td>${day.revenue.toFixed(2)} ₽</td>`;
                    ordersHtml += `<td>${day.orders} шт</td>`;
                }
                datesHtml += '</tr>';
                revenueHtml += '</tr>';
                ordersHtml += '</tr>';
                
                document.getElementById('table-dates').innerHTML = datesHtml;
                document.getElementById('table-revenue').innerHTML = revenueHtml;
                document.getElementById('table-orders').innerHTML = ordersHtml;
                
                let popularHtml = '';
                if (data.data.popular_dishes && data.data.popular_dishes.length > 0) {
                    popularHtml = '<div class="row">';
                    data.data.popular_dishes.forEach((dish, idx) => {
                        popularHtml += `
                            <div class="col-md-4 mb-2">
                                <div class="d-flex justify-content-between p-2" style="background: rgba(50,50,100,0.5); border-radius: 8px;">
                                    <span><strong>${idx+1}.</strong> ${dish.name}</span>
                                    <span style="color: #ffd700;">${dish.count} шт</span>
                                </div>
                            </div>
                        `;
                    });
                    popularHtml += '</div>';
                } else {
                    popularHtml = '<p class="text-center" style="color: rgba(255,255,255,0.7);">Нет данных</p>';
                }
                document.getElementById('popular-dishes').innerHTML = popularHtml;
            }
        } catch (error) {
            console.error('Error:', error);
            document.getElementById('popular-dishes').innerHTML = '<p class="text-center text-danger">Ошибка загрузки</p>';
        }
    }
    
    document.addEventListener('DOMContentLoaded', loadReports);

    function exportData(type) {
        const period = document.getElementById('period-select').value;
        let url = `/export/${type}/?period=${period}`;
        if (period === 'custom') {
            const df = document.getElementById('date-from').value;
            const dt = document.getElementById('date-to').value;
            if (df && dt) url += `&date_from=${df}&date_to=${dt}`;
        }
        window.location.href = url;
    }
</script>

<style>
    .table-dark {
        background: rgba(30,30,70,0.5);
    }
    .table-dark th {
        color: #ffd700;
        font-weight: 600;
    }
    .table-dark td {
        color: white;
    }
</style>
{% endblock %}
