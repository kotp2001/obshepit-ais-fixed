<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - {% block title %}{% endblock %}</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .navbar {
            background: rgba(20,20,50,0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,215,0,0.3);
        }
        .navbar-brand, .nav-link {
            color: #ffd700 !important;
        }
        .footer {
            background: rgba(20,20,50,0.8);
            text-align: center;
            padding: 15px;
            margin-top: 30px;
            border-top: 1px solid rgba(255,215,0,0.3);
            font-size: 12px;
            color: #ffd700;
        }
        .footer a {
            color: #ffd700;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .card {
            background: rgba(30,30,70,0.6);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,215,0,0.2);
            border-radius: 15px;
        }
        .card-header {
            background: rgba(20,20,50,0.8);
            border-bottom: 1px solid rgba(255,215,0,0.2);
            color: #ffd700;
        }
        .btn-warning {
            background-color: #ffd700;
            color: #1a1a4a;
            border: none;
        }
        .btn-warning:hover {
            background-color: #e6c200;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">АИС Общепит</a>
            <div class="ms-auto">
                <button class="btn btn-danger btn-sm" onclick="logout()" id="logoutBtn" style="display: none;">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <div class="container">
            <p>АИС "Общепит", курсовой проект, Дубровин К.С., гр. ИС-61</p>
            <p>
                <a href="/help/">Руководство пользователя</a> |
                <a href="/docs/">Регламенты</a> |
                <a href="/maintenance-log/">Журнал ТО</a> |
                <a href="https://forms.yandex.ru/u/69f11c7990fa7b3c1459172e" target="_blank">Обратная связь</a>
            </p>
        </div>
    </div>

    <!-- Bootstrap JS (обязательно для модальных окон) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function checkAuth() {
            const role = localStorage.getItem('user_role');
            const logoutBtn = document.getElementById('logoutBtn');
            if (role) {
                logoutBtn.style.display = 'block';
            }
        }
        function logout() {
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            window.location.href = '/';
        }
        checkAuth();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
