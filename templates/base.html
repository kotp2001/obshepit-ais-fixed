<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АИС Общепит - {% block title %}Ресторан{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a2a 0%, #1a1a4a 50%, #0a0a2a 100%);
            background-attachment: fixed;
            overflow-x: hidden;
            /* Отступы для фиксированных шапки и подвала */
            padding-top: 70px;      /* высота navbar */
            padding-bottom: 100px;   /* высота footer */
        }
        
        /* Фиксированная шапка */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(20,20,50,0.95);
            backdrop-filter: blur(10px);
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            z-index: 1030;
        }
        
        /* Фиксированный подвал */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(20,20,50,0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            text-align: center;
            color: #ffd700;
            font-size: 13px;
            border-top: 1px solid rgba(255,255,255,0.1);
            z-index: 1030;
        }
        
        /* Контейнер для контента – отступы уже заданы на body */
        .container {
            position: relative;
            z-index: 1;
        }
        
        /* Остальные стили (карточки, кнопки, формы) остаются без изменений */
        .navbar-brand {
            display: none; /* полностью скрываем старый бренд */
        }
        
        .navbar .container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        
        .btn-logout {
            background: #dc3545;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.1s ease;
            margin-left: 10px;
        }
        
        .btn-logout:hover {
            background: #c82333;
            transform: translateY(-1px);
        }
        
        .btn-logout:active {
            transform: translateY(1px);
        }
        
        .main-menu-btn {
            background: #ffd700;
            color: #1a1a4a;
            padding: 6px 15px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.1s ease;
            margin-right: 10px;
            display: inline-block;
        }
        
        .main-menu-btn:hover {
            background: #e6c200;
            transform: translateY(-1px);
            color: #1a1a4a;
            text-decoration: none;
        }
        
        /* Остальные стили (карточки, кнопки, формы) – копируем из вашего предыдущего base.html */
        .card {
            background: rgba(30,30,70,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            overflow: hidden;
        }
        
        .card-header {
            background: rgba(20,20,50,0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 15px 20px;
        }
        
        .card-body {
            color: white;
            padding: 20px;
        }
        
        .btn {
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 500;
            transition: transform 0.1s ease;
            border: none;
            cursor: pointer;
        }
        
        .btn:active {
            transform: scale(0.97);
        }
        
        .btn-warning {
            background: #ffd700;
            color: #1a1a4a;
        }
        
        .btn-warning:hover {
            background: #e6c200;
            transform: translateY(-1px);
        }
        
        .btn-primary {
            background: #1a1a4a;
            color: white;
        }
        
        .btn-primary:hover {
            background: #2a2a5a;
            transform: translateY(-1px);
        }
        
        .btn-success {
            background: #2a5a2a;
            color: white;
        }
        
        .btn-success:hover {
            background: #3a6a3a;
            transform: translateY(-1px);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        
        .btn-danger:hover {
            background: #c82333;
            transform: translateY(-1px);
        }
        
        .btn-secondary {
            background: rgba(100,100,140,0.8);
            color: white;
        }
        
        .form-control {
            background: rgba(50,50,100,0.8);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 25px;
            padding: 10px 15px;
        }
        
        .form-control:focus {
            background: rgba(60,60,110,0.9);
            border-color: #ffd700;
            color: white;
            outline: none;
            box-shadow: 0 0 5px rgba(255,215,0,0.3);
        }
        
        .modal-content {
            background: rgba(20,20,60,0.95) !important;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,215,0,0.3);
        }
        
        .modal-header {
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        
        .modal-body {
            color: white;
        }
        
        .modal-body .form-label {
            color: white;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(30,30,70,0.5);
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }
        
        /* Звёздное небо (фиксированное) */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle 3s ease-in-out infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="stars" id="stars"></div>
    
    <nav class="navbar">
        <div class="container">
            <div>
                <a href="/admin-panel/" id="mainMenuBtn" class="main-menu-btn" style="display: none;">Главное меню</a>
                <button class="btn-logout" onclick="logout()" id="logout-btn" style="display: none;">Выйти</button>
            </div>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <div class="container">
            <p class="mb-0">АИС "Общепит", курсовой проект, Дубровин К.С., гр. ИС-61</p>
            <p class="mb-0 mt-1" style="font-size: 11px;">
                <a href="/help/">Руководство пользователя</a> | 
                <a href="/docs/">Регламенты</a> | 
                <a href="/maintenance-log/">Журнал ТО</a> |
                <a href="https://forms.yandex.ru/u/69f11c7990fa7b3c1459172e" target="_blank">Обратная связь</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 200; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.width = Math.random() * 3 + 'px';
                star.style.height = star.style.width;
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = 2 + Math.random() * 3 + 's';
                starsContainer.appendChild(star);
            }
        }
        createStars();
        
        function checkAuth() {
            const role = localStorage.getItem('user_role');
            const logoutBtn = document.getElementById('logout-btn');
            const mainMenuBtn = document.getElementById('mainMenuBtn');
            if (role) {
                logoutBtn.style.display = 'block';
                // Показываем кнопку "Главное меню" только для администратора
                if (role === 'admin') {
                    mainMenuBtn.style.display = 'inline-block';
                } else {
                    mainMenuBtn.style.display = 'none';
                }
            }
        }
        
        function logout() {
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_name');
            window.location.href = '/';
        }
        
        checkAuth();
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
