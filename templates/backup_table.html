<table style="width:100%;border-collapse:collapse;">
    <thead>
        <tr style="background:rgba(26,26,74,0.7);">
            <th style="padding:12px 18px;color:{% if color == 'purple' %}#c084fc{% else %}#ffd700{% endif %};font-size:13px;">
                <i class="fas fa-file-code me-1"></i>Файл
            </th>
            <th style="padding:12px 18px;color:{% if color == 'purple' %}#c084fc{% else %}#ffd700{% endif %};font-size:13px;">
                <i class="fas fa-calendar me-1"></i>Дата
            </th>
            <th style="padding:12px 18px;color:{% if color == 'purple' %}#c084fc{% else %}#ffd700{% endif %};font-size:13px;">
                <i class="fas fa-weight me-1"></i>Размер
            </th>
            <th style="padding:12px 18px;color:{% if color == 'purple' %}#c084fc{% else %}#ffd700{% endif %};font-size:13px;">
                Действия
            </th>
        </tr>
    </thead>
    <tbody>
        {% for backup in items %}
        <tr style="border-bottom:1px solid rgba(255,255,255,0.06);" onmouseover="this.style.background='rgba(50,50,100,0.35)'" onmouseout="this.style.background=''">
            <td style="padding:12px 18px;color:white;font-size:13px;">
                <i class="fas fa-database me-2" style="color:{% if color == 'purple' %}#c084fc{% else %}#ffd700{% endif %};opacity:.7;"></i>
                {{ backup.name }}
            </td>
            <td style="padding:12px 18px;color:rgba(255,255,255,0.7);font-size:13px;">{{ backup.date }}</td>
            <td style="padding:12px 18px;color:rgba(255,255,255,0.7);font-size:13px;">{{ backup.size }} KB</td>
            <td style="padding:12px 18px;">
                <div class="d-flex gap-2 flex-wrap">
                    <a href="/backup/download/{{ backup.name }}/"
                       class="btn btn-sm btn-warning" style="border-radius:15px;font-size:12px;font-weight:600;">
                        <i class="fas fa-download me-1"></i>Скачать
                    </a>
                    <a href="/backup/restore/{{ backup.name }}/"
                       class="btn btn-sm" style="background:rgba(20,160,200,0.8);color:white;border-radius:15px;font-size:12px;font-weight:600;"
                       onclick="return confirm('Восстановить БД из этой копии? Текущие данные будут заменены!')">
                        <i class="fas fa-undo me-1"></i>Восстановить
                    </a>
                    <a href="/backup/delete/{{ backup.name }}/"
                       class="btn btn-sm btn-danger" style="border-radius:15px;font-size:12px;font-weight:600;"
                       onclick="return confirm('Удалить копию {{ backup.name }}?')">
                        <i class="fas fa-trash me-1"></i>Удалить
                    </a>
                </div>
            </td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4" style="padding:32px;text-align:center;color:rgba(255,255,255,0.35);font-size:13px;">
                <i class="fas fa-inbox fa-2x mb-2 d-block" style="opacity:.3;"></i>
                {{ empty_msg }}
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
