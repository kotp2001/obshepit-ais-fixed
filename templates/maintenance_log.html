{% extends 'base.html' %}
{% block title %}Журнал технического обслуживания{% endblock %}
{% block content %}
<div class="fade-in">
    <div class="d-flex align-items-center mb-3 gap-3">
        <a href="/admin-panel/" class="btn btn-secondary" style="border-radius:20px;padding:6px 18px;font-size:14px;"><i class="fas fa-arrow-left me-1"></i> Назад</a>
    </div>
    <div class="card">
        <div class="card-header">
            <div class="d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Журнал технического обслуживания</h4>
                <button class="btn btn-warning btn-sm" onclick="showAddForm()">+ Добавить запись</button>
            </div>
        </div>
        <div class="card-body">
            <div id="add-form" style="display: none; margin-bottom: 20px; padding: 15px; background: rgba(40,40,90,0.5); border-radius: 10px;">
                <h5 style="color: #ffd700;">Новая запись</h5>
                <div class="row">
                    <div class="col-md-3 mb-2">
                        <label class="form-label">Дата</label>
                        <input type="date" id="log-date" class="form-control">
                    </div>
                    <div class="col-md-4 mb-2">
                        <label class="form-label">Проведенная работа</label>
                        <input type="text" id="log-work" class="form-control" placeholder="Описание работы">
                    </div>
                    <div class="col-md-3 mb-2">
                        <label class="form-label">Выполнил</label>
                        <input type="text" id="log-performer" class="form-control" placeholder="ФИО">
                    </div>
                    <div class="col-md-2 mb-2 d-flex align-items-end">
                        <button class="btn btn-success w-100" onclick="addLogEntry()">Сохранить</button>
                    </div>
                </div>
                <button class="btn btn-secondary btn-sm mt-2" onclick="hideAddForm()">Отмена</button>
            </div>
            
            <div class="table-responsive">
                <table class="table table-dark table-bordered table-hover">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Проведенная работа</th>
                            <th>Выполнил</th>
                            <th>Подпись</th>
                        </tr>
                    </thead>
                    <tbody id="log-table-body">
                        <tr><td colspan="4" class="text-center">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    async function loadLogs() {
        try {
            const response = await fetch('/api/maintenance-logs/');
            const data = await response.json();
            if (data.success) {
                const tbody = document.getElementById('log-table-body');
                if (data.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="text-center">Нет записей</td></tr>';
                } else {
                    tbody.innerHTML = data.data.map(log => `
                        <tr>
                            <td>${log.date}</td>
                            <td>${log.work_performed}</td>
                            <td>${log.performed_by}</td>
                            <td>${log.signature || '—'}</td>
                        </tr>
                    `).join('');
                }
            }
        } catch (error) {
            document.getElementById('log-table-body').innerHTML = '<tr><td colspan="4" class="text-center text-danger">Ошибка загрузки</td></tr>';
        }
    }
    
    function showAddForm() {
        document.getElementById('add-form').style.display = 'block';
    }
    
    function hideAddForm() {
        document.getElementById('add-form').style.display = 'none';
        document.getElementById('log-date').value = '';
        document.getElementById('log-work').value = '';
        document.getElementById('log-performer').value = '';
    }
    
    async function addLogEntry() {
        const date = document.getElementById('log-date').value;
        const work = document.getElementById('log-work').value;
        const performer = document.getElementById('log-performer').value;
        
        if (!date || !work || !performer) {
            alert('Заполните все поля');
            return;
        }
        
        try {
            const response = await fetch('/api/maintenance-logs/add/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({date: date, work_performed: work, performed_by: performer})
            });
            const data = await response.json();
            if (data.success) {
                hideAddForm();
                loadLogs();
                alert('Запись добавлена');
            } else {
                alert('Ошибка: ' + data.error);
            }
        } catch (error) {
            alert('Ошибка соединения');
        }
    }
    
    loadLogs();
</script>
{% endblock %}
