{% extends 'base.html' %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="fade-in">
            <div class="card">
                <div class="card-header bg-dark text-white py-3 text-center">
                    <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i> Вход в систему</h4>
                </div>
                <div class="card-body p-4">
                    {% if error %}
                        <div class="alert alert-danger mb-3">{{ error }}</div>
                    {% endif %}
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="form-group mb-3">
                            <label class="fw-bold mb-2">Имя пользователя</label>
                            <input type="text" name="username" class="form-control" required placeholder="Введите логин">
                        </div>
                        <div class="form-group mb-4">
                            <label class="fw-bold mb-2">Пароль</label>
                            <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-lg">Войти</button>
                        </div>
                    </form>
                    
                    <hr class="my-4">
                    
                    <div class="alert alert-info small mb-0">
                        <i class="fas fa-info-circle me-2"></i>
                        <strong>Тестовые данные:</strong><br>
                        Администратор: admin / admin123
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
