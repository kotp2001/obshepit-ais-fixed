{% extends 'base.html' %}
{% block title %}Кухня - Повар{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
            <h4 class="mb-0">Кухня - Активные заказы</h4>
            <button class="btn btn-warning btn-sm" id="refresh-orders">Обновить</button>
        </div>
    </div>
    <div class="card-body" id="orders-container">
        <div class="text-center py-5">
            <div class="spinner-border text-light" role="status"></div>
            <p class="mt-2">Загрузка заказов...</p>
        </div>
    </div>
</div>

<script>
    async function loadOrders() {
        try {
            const response = await fetch('/api/orders/active/');
            const data = await response.json();
            if (data.success) {
                const activeOrders = data.data.filter(order => order.status !== 'ready' && order.status !== 'paid');
                if (activeOrders.length === 0) {
                    document.getElementById('orders-container').innerHTML = `
                        <div class="alert alert-success text-center" style="background: rgba(40,90,40,0.6); border: none; color: #ffd700;">
                            <h5>Нет активных заказов</h5>
                            <p class="mb-0">Все заказы выполнены</p>
                        </div>
                    `;
                    return;
                }
                let html = '<div class="row">';
                for (const order of activeOrders) {
                    html += `
                        <div class="col-md-6 mb-4">
                            <div class="card" style="background: rgba(40,40,90,0.6);">
                                <div class="card-header" style="background: rgba(20,20,50,0.8);">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <h5 class="mb-0" style="color: #ffd700;">Заказ номер ${order.id}</h5>
                                        <span class="badge bg-light text-dark">Стол ${order.table_number}</span>
                                    </div>
                                    <small style="color: white;">Создан: ${order.created_at}</small>
                                </div>
                                <div class="card-body">
                                    <ul class="list-group list-group-flush" style="background: transparent;">
                    `;
                    for (const item of order.items) {
                        let statusText = '', statusColor = '', buttonHtml = '';
                        if (item.status === 'pending') {
                            statusText = 'Ожидает';
                            statusColor = '#17a2b8';
                            buttonHtml = `<button class="btn btn-sm btn-warning" onclick="updateItemStatus(${item.id}, 'cooking')">Начать готовку</button>`;
                        } else if (item.status === 'cooking') {
                            statusText = 'Готовится';
                            statusColor = '#ffc107';
                            buttonHtml = `<button class="btn btn-sm btn-success" onclick="updateItemStatus(${item.id}, 'ready')">Готово</button>`;
                        } else if (item.status === 'ready') {
                            statusText = 'Готов';
                            statusColor = '#28a745';
                            buttonHtml = `<span class="badge bg-success">Готов</span>`;
                        }
                        html += `
                            <li class="list-group-item d-flex justify-content-between align-items-center" style="background: rgba(50,50,100,0.5); color: white; border-bottom: 1px solid rgba(255,255,255,0.1);">
                                <div>
                                    <strong>${item.dish_name}</strong>
                                    <span class="ms-2" style="color: #ffd700;">x${item.quantity}</span>
                                </div>
                                <div>
                                    <span class="badge" style="background: ${statusColor}; color: black;">${statusText}</span>
                                    ${buttonHtml}
                                </div>
                            </li>
                        `;
                    }
                    const allReady = order.items.every(item => item.status === 'ready');
                    let readyButton = '';
                    if (allReady && order.status !== 'ready') {
                        readyButton = `<button class="btn btn-success w-100 mt-3" onclick="markOrderReady(${order.id})">Заказ готов</button>`;
                    } else if (order.status === 'ready') {
                        readyButton = `<span class="badge bg-success w-100 mt-3" style="padding: 10px;">ЗАКАЗ ГОТОВ</span>`;
                    }
                    html += `
                                    </ul>
                                    ${readyButton}
                                </div>
                            </div>
                        </div>
                    `;
                }
                html += '</div>';
                document.getElementById('orders-container').innerHTML = html;
            }
        } catch (error) {
            document.getElementById('orders-container').innerHTML = '<p class="text-center text-danger">Ошибка загрузки заказов</p>';
        }
    }

    async function updateItemStatus(itemId, status) {
        try {
            await fetch('/api/orders/update-item/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({item_id: itemId, status: status})
            });
            loadOrders();
        } catch (error) {
            alert('Ошибка: ' + error);
        }
    }

    async function markOrderReady(orderId) {
        try {
            await fetch('/api/orders/mark-ready/', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({order_id: orderId})
            });
            loadOrders();
        } catch (error) {
            alert('Ошибка: ' + error);
        }
    }

    document.getElementById('refresh-orders').addEventListener('click', loadOrders);
    loadOrders();
    setInterval(loadOrders, 5000);
</script>
{% endblock %}
